<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROZGAR AI - R YADAV PRODUCTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-btn { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%) !important; color: white !important; transform: scale(1.05); border: none !important; }
        .job-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 28px !important; overflow: hidden; background: white; }
        .job-card:hover { transform: translateY(-8px); box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.15); }
        .marquee-live { animation: scroll 25s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body class="bg-slate-50 font-sans transition-all duration-300">

    <div id="app-container" class="max-w-md mx-auto min-h-screen flex flex-col relative bg-white">
        
        <div class="p-4 bg-blue-950 text-white flex justify-between items-center sticky top-0 z-50 shadow-lg">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-blue-800 border-2 border-blue-400 flex items-center justify-center font-black text-[10px]">PFP</div>
                <div>
                    <h1 class="text-lg font-black italic uppercase leading-none tracking-tighter">ROZGAR</h1>
                    <p class="text-[7px] font-bold text-blue-400 uppercase tracking-widest">R YADAV PRODUCTION</p>
                </div>
            </div>
            <button onclick="toggleDarkMode()" id="dark-btn" class="bg-red-600 p-2.5 rounded-full shadow-lg active:scale-90 transition">🌙</button>
        </div>

        <div class="p-4 bg-white sticky top-[64px] z-40 border-b">
            <div class="relative">
                <input type="text" id="main-search" onkeyup="searchEverything()" placeholder="Search Jobs, Board Results, SSC..." 
                class="w-full p-4 pl-12 rounded-2xl bg-slate-100 border-none font-bold text-xs focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <span class="absolute left-4 top-4 text-lg">🔍</span>
            </div>
        </div>

        <div class="bg-yellow-400 text-black py-2 overflow-hidden border-b border-yellow-500">
            <div class="marquee-live flex whitespace-nowrap uppercase italic font-black text-[10px]">
                <span>🔥 BSEB Matric Result 2026 • SSC GD Final List • Railway Recruitment • Internshala WFH Jobs 🔥</span>
            </div>
        </div>

        <div class="p-3 grid grid-cols-3 gap-2 bg-white border-b shadow-sm">
            <button id="tab-govt" onclick="switchTab('govt')" class="py-3 border rounded-xl text-[9px] font-black uppercase active-btn">🏛️ Govt</button>
            <button id="tab-result" onclick="switchTab('result')" class="py-3 border rounded-xl text-[9px] font-black uppercase">📄 Result</button>
            <button id="tab-private" onclick="switchTab('private')" class="py-3 border rounded-xl text-[9px] font-black uppercase">🏢 Private</button>
        </div>

        <div id="results-box" class="p-4 space-y-6 bg-slate-50 flex-1 pb-40">
            </div>

        <div class="fixed bottom-6 right-6 flex flex-col gap-3 z-50">
            <a href="https://www.instagram.com/___rahul_yadav_._" target="_blank" class="flex items-center gap-2 bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-600 text-white pl-4 pr-2 py-2 rounded-full shadow-2xl border-2 border-white">
                <span class="text-[8px] font-black uppercase">Follow</span>
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="w-6 h-6 bg-white rounded-full p-1">
            </a>
            <a href="https://chat.whatsapp.com/JOvQploZdepGZEQgMpYcmv" target="_blank" class="flex items-center gap-2 bg-blue-600 text-white pl-4 pr-2 py-2 rounded-full shadow-2xl border-2 border-white">
                <span class="text-[8px] font-black uppercase">VIP Group</span>
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="w-6 h-6 bg-white rounded-full p-1">
            </a>
        </div>
    </div>

    <script>
        // BADA DATABASE (Link Fixed ke saath)
        const database = {
            govt: [
                { title: "Bihar Police Constable", info: "Home Dept. Recruitment", year: "2024", vacancy: "21,391", post: "Constable", btn: "Apply Now 🚀", url: "https://csbc.bih.nic.in" },
                { title: "Railway RRB ALP", info: "Indian Railways News", year: "2025", vacancy: "5,696", post: "Loco Pilot", btn: "Apply Now 🚀", url: "https://indianrailways.gov.in" },
                { title: "SSC GD Constable", info: "Staff Selection Commission", year: "2026", vacancy: "45,000+", post: "GD Constable", btn: "View Details 🔍", url: "https://ssc.gov.in" },
                { title: "BPSC 70th CCE", info: "Bihar Civil Services", year: "2024", vacancy: "1,923", post: "SDM/DSP", btn: "Apply Now 🚀", url: "https://bpsc.bih.nic.in" },
                { title: "Indian Army Agniveer", info: "Defense Updates", year: "2026", vacancy: "Bulk", post: "Soldier", btn: "Apply Now 🚀", url: "https://joinindianarmy.nic.in" }
            ],
            result: [
                { title: "Bihar Board 10th (Matric)", info: "BSEB Patna Result", year: "2025", vacancy: "16.5L Students", post: "Annual Exam", btn: "Check Result 📄", url: "http://results.biharboardonline.com" },
                { title: "Bihar Board 12th (Inter)", info: "BSEB Patna Result", year: "2025", vacancy: "13.2L Students", post: "Annual Exam", btn: "Check Result 📄", url: "http://results.biharboardonline.com" },
                { title: "SSC CGL Tier-1 Result", info: "SSC Official Update", year: "2024", vacancy: "17,727", post: "Group B & C", btn: "Download PDF 📥", url: "https://ssc.gov.in" },
                { title: "Railway Group D Final", info: "RRB Result Portal", year: "2024", vacancy: "1L+", post: "Trackman/Helper", btn: "Check Status 📄", url: "https://rrbcdg.gov.in" }
            ],
            private: [
                { title: "Amazon: Data Entry", info: "Internshala Remote", year: "2026", vacancy: "100+", post: "WFH Executive", btn: "Apply via Internshala 🏢", url: "https://internshala.com" },
                { title: "Flipkart Warehouse", info: "Naukri App Listing", year: "2026", vacancy: "500+", post: "Supervisor", btn: "Apply Now 🚀", url: "https://naukri.com" },
                { title: "Zomato Delivery Partner", info: "Local Arwal/Patna", year: "2026", vacancy: "Bulk", post: "Delivery Boy", btn: "Join Now 🚀", url: "https://zomato.com" },
                { title: "Google India: Intern", info: "Tech Internship", year: "2026", vacancy: "20", post: "Developer", btn: "Apply Now 🚀", url: "https://google.com/about/careers" }
            ]
        };

        function switchTab(type) {
            document.getElementById('tab-govt').classList.remove('active-btn');
            document.getElementById('tab-result').classList.remove('active-btn');
            document.getElementById('tab-private').classList.remove('active-btn');
            document.getElementById('tab-' + type).classList.add('active-btn');
            renderCards(database[type]);
        }

        function renderCards(data) {
            const box = document.getElementById('results-box');
            box.innerHTML = '';
            
            if(data.length === 0) {
                box.innerHTML = `<p class="text-center py-10 font-bold text-slate-400">No Jobs Found!</p>`;
                return;
            }

            data.forEach(item => {
                box.innerHTML += `
                    <div class="job-card p-6 border shadow-sm relative">
                        <div class="absolute top-0 right-0 bg-blue-100 text-blue-800 text-[7px] px-3 py-1 rounded-bl-xl font-black">YEAR: ${item.year}</div>
                        <h3 class="font-black text-blue-950 uppercase text-sm mb-1">${item.title}</h3>
                        <p class="text-[9px] text-slate-400 font-bold italic mb-4">${item.info}</p>
                        
                        <div class="grid grid-cols-2 gap-3 mb-5">
                            <div class="bg-slate-50 p-2 rounded-xl border border-dashed">
                                <p class="text-[6px] text-slate-400 uppercase">Vacancy/Cap</p>
                                <p class="text-[9px] font-black text-blue-900">${item.vacancy}</p>
                            </div>
                            <div class="bg-slate-50 p-2 rounded-xl border border-dashed">
                                <p class="text-[6px] text-slate-400 uppercase">Post Name</p>
                                <p class="text-[9px] font-black text-green-600">${item.post}</p>
                            </div>
                        </div>

                        <button onclick="window.open('${item.url}', '_blank')" class="w-full bg-blue-950 text-white py-3.5 rounded-2xl font-black text-[10px] uppercase shadow-lg active:scale-95 transition-all">
                            ${item.btn}
                        </button>
                    </div>`;
            });
        }

        function searchEverything() {
            let query = document.getElementById('main-search').value.toLowerCase();
            let all = [...database.govt, ...database.result, ...database.private];
            let filtered = all.filter(i => 
                i.title.toLowerCase().includes(query) || 
                i.post.toLowerCase().includes(query) || 
                i.year.includes(query)
            );
            renderCards(filtered);
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.body.style.backgroundColor = isDark ? "#020617" : "#f8fafc";
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        window.onload = () => {
            if(localStorage.getItem('theme') === 'dark') toggleDarkMode();
            switchTab('govt');
        };
    </script>
</body>
</html>
