<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .update-overlay { position: fixed; inset: 0; background: #0f172a; z-index: 2000; display: none; align-items: center; justify-content: center; flex-direction: column; color: white; font-family: sans-serif; }
    </style>
</head>
<body class="bg-slate-100">

    <div id="update-bar-ui" class="update-overlay">
        <h1 class="text-4xl font-black italic">ROZGAR <span class="text-blue-500">2.1</span></h1>
        <p class="text-blue-400 font-bold text-[10px] mt-2 tracking-widest uppercase">R YADAV PRODUCTION</p>
        <div class="w-64 h-1.5 bg-slate-800 rounded-full mt-10 overflow-hidden">
            <div id="p-fill" class="h-full bg-blue-500 transition-all duration-300" style="width: 0%"></div>
        </div>
        <p id="p-text" class="mt-4 text-[10px] text-slate-400 uppercase">Updating System... 0%</p>
    </div>

    <div id="main-app" class="max-w-md mx-auto min-h-screen bg-white shadow-2xl flex flex-col relative overflow-hidden">
        <div class="p-4 bg-blue-950 text-white flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black italic tracking-tighter">ROZGAR</h1>
                <p class="text-[7px] font-bold text-blue-400">R YADAV PRODUCTION</p>
            </div>
            <button onclick="clearData()" class="text-[8px] bg-red-600 px-2 py-1 rounded font-bold">RESET</button>
        </div>

        <div id="login-view" class="p-8 flex-1 flex flex-col justify-center hidden">
            <h2 class="text-3xl font-black text-center mb-8">Swagat Hai!</h2>
            <input id="un" type="text" placeholder="Naam" class="w-full p-4 border rounded-xl mb-4">
            <input id="us" type="text" placeholder="State" class="w-full p-4 border rounded-xl mb-6">
            <button onclick="doLogin()" class="w-full bg-blue-950 text-white p-5 rounded-xl font-black shadow-lg">START 🚀</button>
        </div>

        <div id="dash-view" class="flex-1 hidden">
            <div class="p-3 border-b sticky top-0 bg-white z-50 flex gap-2 overflow-x-auto">
                <button onclick="loadData('all','latest jobs')" class="px-4 py-2 bg-blue-900 text-white rounded-lg text-[10px] font-bold uppercase whitespace-nowrap">Jobs</button>
                <button onclick="loadData('results','exam result')" class="px-4 py-2 bg-slate-100 rounded-lg text-[10px] font-bold uppercase whitespace-nowrap">Results</button>
            </div>
            <div id="results-box" class="p-4 space-y-4"></div>
            <div id="load-msg" class="hidden text-center py-10 text-[10px] font-bold text-blue-900">Searching Official Links...</div>
        </div>

        <button onclick="showChat()" class="fixed bottom-6 right-6 w-14 h-14 bg-blue-950 text-white rounded-full shadow-2xl flex items-center justify-center text-2xl z-50 animate-bounce">🤖</button>

        <div id="chat-ui" class="fixed inset-0 bg-white z-[1000] hidden flex-col">
            <div class="p-4 bg-blue-950 text-white flex justify-between items-center">
                <span class="font-black italic">ROZGAR AI</span>
                <button onclick="hideChat()" class="text-xs font-bold bg-white/20 px-3 py-1 rounded">CLOSE</button>
            </div>
            <div id="msg-box" class="flex-1 p-4 overflow-y-auto space-y-4 bg-slate-50 text-sm"></div>
            <div class="p-4 border-t flex gap-2">
                <input id="chat-in" type="text" placeholder="Study plan pucho..." class="flex-1 p-3 bg-slate-100 rounded-lg outline-none">
                <button onclick="sendChat()" class="bg-blue-950 text-white px-5 rounded-lg font-bold">ASK</button>
            </div>
        </div>
    </div>

    <script>
        // SMART LOGIC: LocalStorage se version check
        async function smartUpdate() {
            try {
                const res = await fetch('/get_version');
                const serverData = await res.json();
                const localVer = localStorage.getItem('app_version');

                // Agar server ka version local se bada hai, tabhi update bar dikhao
                if (serverData.version !== localVer) {
                    const ui = document.getElementById('update-bar-ui');
                    const fill = document.getElementById('p-fill');
                    ui.style.display = 'flex';
                    
                    let p = 0;
                    let t = setInterval(() => {
                        p += 5;
                        fill.style.width = p + '%';
                        document.getElementById('p-text').innerText = "Installing Secure Update... " + p + "%";
                        
                        if (p >= 100) {
                            clearInterval(t);
                            // UPDATE LOCAL VERSION: Ab agli baar loop nahi hoga
                            localStorage.setItem('app_version', serverData.version);
                            setTimeout(() => location.reload(), 500);
                        }
                    }, 100);
                }
            } catch(e) { console.log("Offline"); }
        }

        window.onload = () => {
            smartUpdate();
            if(localStorage.getItem('user_n')) {
                document.getElementById('dash-view').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('login-view').classList.remove('hidden');
            }
        };

        function doLogin() {
            const n = document.getElementById('un').value;
            const s = document.getElementById('us').value;
            if(!n || !s) return alert("Details bharo bhai!");
            localStorage.setItem('user_n', n);
            localStorage.setItem('user_s', s);
            location.reload();
        }

        async function loadData(t='all', i='latest') {
            const box = document.getElementById('results-box');
            const ldr = document.getElementById('load-msg');
            box.innerHTML = "";
            ldr.classList.remove('hidden');
            const res = await fetch('/search', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({state: localStorage.getItem('user_s'), type: t, interest: i})
            });
            const data = await res.json();
            ldr.classList.add('hidden');
            data.forEach(item => {
                box.innerHTML += `
                <div class="p-4 border rounded-xl shadow-sm bg-white border-l-4 border-blue-900">
                    <h3 class="font-black text-[12px] mb-2">${item.title}</h3>
                    <a href="${item.link}" target="_blank" class="text-blue-700 text-[10px] font-bold underline">Official Site Link →</a>
                </div>`;
            });
        }

        function showChat() { document.getElementById('chat-ui').style.display='flex'; }
        function hideChat() { document.getElementById('chat-ui').style.display='none'; }

        async function sendChat() {
            const input = document.getElementById('chat-in');
            const box = document.getElementById('msg-box');
            if(!input.value) return;
            const userM = input.value;
            box.innerHTML += `<div class="bg-blue-100 p-3 rounded-lg ml-8 font-bold">${userM}</div>`;
            input.value = "";
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: userM, name: localStorage.getItem('user_n')})
            });
            const d = await res.json();
            box.innerHTML += `<div class="bg-white border p-3 rounded-lg mr-8 shadow-sm"><b>AI:</b> ${d.reply}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        function clearData() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
