<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROZGAR HUB - Professional Portal</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007bff">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
      }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --main: #121212; --blue: #007bff; --light-blue: #e7f1ff; --bg: #f8fafc; --white: #ffffff; --text-muted: #64748b; --neon-glow: rgba(0, 123, 255, 0.6); }
        body.dark-mode { --bg: #0f172a; --white: #1e293b; --main: #f1f5f9; --text-muted: #94a3b8; --light-blue: #1e3a8a; --neon-glow: rgba(0, 210, 255, 0.8); }
        body { background: var(--bg); font-family: 'Inter', sans-serif; margin: 0; padding: 0; padding-bottom: 120px; color: var(--main); transition: 0.3s; overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        
        header { background: var(--white); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; box-shadow: 0 0 15px var(--neon-glow); }
        .logo-text { font-weight: 800; font-size: 20px; color: var(--blue); letter-spacing: -0.5px; cursor: pointer; text-shadow: 0 0 10px var(--blue); }

        .live-panel, .dash-card, .social-link-card, .job-card, .card, .pill, .input-box, .login-card, .edu-chip {
            border: 1px solid var(--blue) !important;
            box-shadow: 0 0 15px var(--neon-glow) !important;
            transition: 0.3s;
        }

        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--white); z-index: 1000; transition: 0.3s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); padding: 25px; box-sizing: border-box; }
        .side-menu.active { left: 0; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
        .menu-overlay.active { display: block; }
        .menu-item { padding: 15px 0; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; cursor: pointer; font-weight: 600; font-size: 14px; }
        
        .live-panel { background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 24px; padding: 18px; margin-bottom: 25px; position: relative; border: none !important; }
        .live-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .live-dot { width: 12px; height: 12px; background: #ff4757; border-radius: 50%; animation: blink 1s infinite; box-shadow: 0 0 15px #ff4757; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        .ticker-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; height: 120px; overflow: hidden; }
        .ticker-col { display: flex; flex-direction: column; }
        .ticker-title { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--blue); margin-bottom: 8px; text-align: center; background: rgba(0,123,255,0.1); padding: 4px; border-radius: 6px; }
        .scroll-box { animation: scrollUp 20s linear infinite; }
        @keyframes scrollUp { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
        .ticker-item { font-size: 12px; color: #cbd5e1; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: block; text-decoration: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .login-card { background: var(--white); padding: 30px 25px; border-radius: 24px; }
        .input-box { width: 100%; padding: 16px; border-radius: 14px; font-size: 14px; font-weight: 600; box-sizing: border-box; outline: none; margin-bottom: 18px; background: var(--white); color: var(--main); }
        label { display: block; font-size: 12px; font-weight: 800; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
        .edu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .edu-chip { padding: 12px; border-radius: 12px; text-align: center; font-size: 13px; font-weight: 700; cursor: pointer; background: var(--white); color: var(--text-muted); }
        .edu-chip.selected { background: var(--blue) !important; color: #fff !important; }
        .card { background: var(--white); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .dash-card { background: var(--white); padding: 15px; border-radius: 18px; text-align: center; cursor: pointer; }
        .job-card { background: var(--white); padding: 18px; border-radius: 16px; margin-bottom: 12px; }
        .btn-primary { width: 100%; background: var(--blue); color: white; padding: 18px; border: none; border-radius: 15px; font-size: 16px; font-weight: 800; cursor: pointer; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid var(--blue); max-width: 500px; margin: 0 auto; z-index: 99; }
        .nav-item { text-align: center; color: #94a3b8; font-size: 10px; font-weight: 700; cursor: pointer; text-decoration: none;}
        .nav-item.active { color: var(--blue); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 3px; font-style: normal; }
        .hidden { display: none; }
        .pill { background: #fff; padding: 8px 16px; border-radius: 50px; font-size: 12px; font-weight: 600; cursor: pointer; margin-bottom: 5px; color: var(--text-muted); }
        .pill.active-pill { background: var(--blue) !important; color: white !important; }
        
        .social-link-card { display: flex; align-items: center; justify-content: space-between; background: var(--white); padding: 15px; border-radius: 18px; margin-top: 10px; text-decoration: none; }

        #ai-trigger { position: fixed; bottom: 85px; right: 20px; z-index: 1001; cursor: pointer; text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .ai-robot { font-size: 45px; animation: float 3s ease-in-out infinite; display: block; filter: drop-shadow(0 0 15px var(--blue)); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .ai-label { background: var(--blue); color: white; padding: 6px 12px; border-radius: 12px; font-size: 11px; font-weight: 800; margin-top: -5px; }

    </style>
</head>
<body id="app-body">

<a id="ai-trigger" href="https://gemini.google.com/" target="_blank">
    <span class="ai-robot">🤖</span>
    <div class="ai-label">ASK AI</div>
</a>

<div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="side-menu" id="sideMenu">
    <h3 style="margin-top:0; color:var(--blue);">Settings ⚙️</h3>
    <div class="menu-item" onclick="editProfile()">👤 Edit Profile</div>
    <div class="menu-item" onclick="toggleDarkMode()">🌓 Switch Theme</div>
    <div class="menu-item" onclick="location.reload()">🔄 Refresh</div>
    <div class="menu-item" style="color:red; border:none;" onclick="logout()">🚪 Logout</div>
</div>

<header>
    <div class="logo-text" onclick="toggleMenu()">ROZGAR HUB</div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div onclick="toggleDarkMode()" style="cursor:pointer; font-size: 20px;">🌙</div>
        <div id="user-initial" style="background:var(--light-blue); color:var(--blue); width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; border: 1px solid var(--blue);">U</div>
    </div>
</header>

<div class="container">
    <div id="login-sec" class="hidden">
        <div class="login-card">
            <h1 style="text-align:center;">Welcome! 🚀</h1>
            <label>Name</label>
            <input type="text" id="u-name" class="input-box">
            <label>Contact</label>
            <input type="text" id="u-contact" class="input-box">
            <label>State</label>
            <input type="text" id="u-state" class="input-box">
            <label>Education</label>
            <div class="edu-grid">
                <div class="edu-chip" onclick="toggleEdu(this, '10th')">10th</div>
                <div class="edu-chip" onclick="toggleEdu(this, '12th')">12th</div>
                <div class="edu-chip" onclick="toggleEdu(this, 'ITI')">ITI</div>
                <div class="edu-chip" onclick="toggleEdu(this, 'UG')">Graduate</div>
            </div>
            <button onclick="saveLogin()" class="btn-primary">Save Profile</button>
        </div>
    </div>

    <div id="dash-sec" class="hidden">
        <div class="live-panel">
            <div class="live-header"><div class="live-dot"></div><span style="color:white; font-weight:800;">LIVE UPDATES</span></div>
            <div class="ticker-container">
                <div class="ticker-col"><div class="ticker-title">Jobs</div><div id="job-ticker" class="scroll-box"></div></div>
                <div class="ticker-col"><div class="ticker-title">Admit</div><div id="admit-ticker" class="scroll-box"></div></div>
            </div>
        </div>

        <div class="dash-grid">
            <div class="dash-card" onclick="openJobs('Govt Jobs')"><i>🏛️</i>Govt Jobs</div>
            <div class="dash-card" onclick="openJobs('Railway Jobs')"><i>🚂</i>Railway</div>
            <div class="dash-card" onclick="openJobs('ITI Jobs')"><i>⚙️</i>ITI Jobs</div>
            <div class="dash-card" onclick="openJobs('Remote Jobs')"><i>🏠</i>Remote</div>
        </div>
    </div>

    <div id="res-sec" class="hidden">
        <h3 style="margin-bottom:15px;">Results 📄</h3>
        <div class="dash-grid">
            <div class="dash-card" onclick="alert('Coming Soon')">Exam Results</div>
        </div>
    </div>

    <div id="feed-sec" class="hidden">
        <div id="list"></div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="showDash()"><i>🏠</i>Home</div>
    <div class="nav-item" onclick="showResults()"><i>📄</i>Results</div>
    <div class="nav-item" onclick="toggleMenu()"><i>⚙️</i>Settings</div>
</div>

<script>
    let user = {}; let currentCat = '';

    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
    
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    }

    // FIXED: "save" ko "saved" kiya taaki blank screen na aaye
    window.onload = () => {
        if(localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
        const saved = localStorage.getItem('rozgarUser');
        if(saved) { 
            user = JSON.parse(saved); 
            showDash(); 
        } else { 
            document.getElementById('login-sec').classList.remove('hidden'); 
        }
    };

    function toggleEdu(el, val) {
        document.querySelectorAll('.edu-chip').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected'); user.edu = val;
    }

    function saveLogin() {
        user.name = document.getElementById('u-name').value;
        user.contact = document.getElementById('u-contact').value;
        user.state = document.getElementById('u-state').value;
        localStorage.setItem('rozgarUser', JSON.stringify(user));
        showDash();
    }

    function showDash() {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('dash-sec').classList.remove('hidden');
        document.getElementById('user-initial').innerText = user.name ? user.name[0].toUpperCase() : 'U';
        loadLiveUpdates();
    }

    function showResults() {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('res-sec').classList.remove('hidden');
    }

    async function loadLiveUpdates() {
        try {
            const res = await fetch('/get_live_updates');
            const data = await res.json();
            const jb = document.getElementById('job-ticker');
            const ad = document.getElementById('admit-ticker');
            jb.innerHTML = data.jobs.map(j => `<a href="${j.link}" class="ticker-item">${j.title}</a>`).join('');
            ad.innerHTML = data.admits.map(a => `<a href="${a.link}" class="ticker-item">${a.title}</a>`).join('');
        } catch(e) {}
    }

    function openJobs(cat) {
        currentCat = cat;
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('feed-sec').classList.remove('hidden');
        fetchData();
    }

    async function fetchData() {
        const lst = document.getElementById('list');
        lst.innerHTML = 'Loading...';
        try {
            const res = await fetch('/fetch_jobs', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ category: currentCat, state: user.state, edu: user.edu })
            });
            const data = await res.json();
            lst.innerHTML = data.map(i => `<div class="job-card"><b>${i.title}</b><br><a href="${i.link}">View</a></div>`).join('');
        } catch(e) { lst.innerHTML = 'Error fetching data'; }
    }

    function logout() { localStorage.removeItem('rozgarUser'); location.reload(); }
</script>
</body>
</html>
