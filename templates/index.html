<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROZGAR - R YADAV PRODUCTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-btn { background-color: #172554 !important; color: white !important; border-color: #172554 !important; transform: scale(1.05); }
        .marquee-live { animation: scroll 20s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body class="bg-slate-100 font-sans">

    <div id="app-container" class="max-w-md mx-auto min-h-screen bg-white shadow-2xl flex flex-col relative">
        
        <div class="p-4 bg-blue-950 text-white flex justify-between items-center sticky top-0 z-50 shadow-md">
            <div class="flex items-center gap-3">
                <div id="nav-pfp" onclick="showProfile()" class="w-10 h-10 rounded-full bg-blue-800 border-2 border-blue-400 overflow-hidden cursor-pointer flex items-center justify-center font-black text-xs shadow-inner">👤</div>
                <div>
                    <h1 class="text-lg font-black italic uppercase leading-none">ROZGAR</h1>
                    <p class="text-[7px] font-bold text-blue-400 uppercase tracking-widest">R YADAV PRODUCTION</p>
                </div>
            </div>
            <button onclick="showChat()" class="bg-blue-800 p-2.5 rounded-full shadow-lg active:scale-90 transition">🤖</button>
        </div>

        <div id="login-view" class="p-8 flex-1 flex flex-col justify-center hidden bg-white">
            <h2 class="text-3xl font-black mb-2 italic">WELCOME ✍️</h2>
            <p class="text-[10px] text-slate-400 font-bold mb-8 uppercase tracking-widest border-b pb-4">Arwal's Digital Job Portal</p>
            <div class="space-y-4">
                <input id="un" type="text" placeholder="Full Name" class="w-full p-4 rounded-xl border-2 font-bold outline-none bg-slate-50">
                <input id="ue" type="email" placeholder="Email Address" class="w-full p-4 rounded-xl border-2 font-bold outline-none bg-slate-50">
                <input id="us" type="text" placeholder="City/State" class="w-full p-4 rounded-xl border-2 font-bold outline-none bg-slate-50">
                <button onclick="doLogin()" class="w-full bg-blue-950 text-white p-5 rounded-xl font-black text-lg shadow-xl uppercase active:scale-95 transition">Verify Profile 🚀</button>
            </div>
        </div>

        <div id="dash-view" class="flex-1 flex flex-col hidden">
            <div class="bg-yellow-400 text-black py-2 overflow-hidden border-b-2 border-yellow-500 cursor-pointer" onclick="window.open('https://www.sarkariresult.com','_blank')">
                <div class="marquee-live flex whitespace-nowrap uppercase italic font-black text-[10px]">
                    <span>🔥 SSC GD Answer Key • Bihar Police Result 2026 • Railway Updates • R YADAV PRODUCTION VIP UPDATE 🔥</span>
                </div>
            </div>

            <div class="bg-white p-3 flex gap-2 overflow-x-auto no-scrollbar border-b">
                <button id="tab-central" onclick="switchTab('central')" class="px-5 py-2.5 border-2 border-blue-950 rounded-xl text-[10px] font-black uppercase whitespace-nowrap transition active-btn">Central Jobs</button>
                <button id="tab-state" onclick="switchTab('state')" class="px-5 py-2.5 border-2 border-blue-950 rounded-xl text-[10px] font-black uppercase whitespace-nowrap transition">State Jobs</button>
                <button id="tab-results" onclick="switchTab('results')" class="px-5 py-2.5 border-2 border-blue-950 rounded-xl text-[10px] font-black uppercase whitespace-nowrap transition">Results</button>
            </div>

            <div id="result-cats" class="hidden p-3 grid grid-cols-2 gap-2 bg-blue-50 border-b">
                <button onclick="loadData('Bihar Board 10th 12th Result 2026')" class="p-2 bg-white rounded-lg shadow-sm border font-black text-[8px] uppercase hover:bg-blue-100">Bihar Board 📝</button>
                <button onclick="loadData('SSC Official Results CGL CHSL GD')" class="p-2 bg-white rounded-lg shadow-sm border font-black text-[8px] uppercase hover:bg-blue-100">SSC Portal 🏢</button>
                <button onclick="loadData('Railway RRB Results 2026')" class="p-2 bg-white rounded-lg shadow-sm border font-black text-[8px] uppercase hover:bg-blue-100">Railway 🚂</button>
                <button onclick="loadData('Bihar Police SI Constable Result')" class="p-2 bg-white rounded-lg shadow-sm border font-black text-[8px] uppercase hover:bg-blue-100">Bihar Police 👮</button>
            </div>

            <div id="results-box" class="p-4 space-y-6"></div>
            
            <div id="load-more-div" class="p-6 text-center hidden">
                <button onclick="loadMore()" class="bg-blue-950 text-white px-10 py-4 rounded-2xl font-black text-[10px] uppercase shadow-2xl">Load More Data ⬇️</button>
            </div>
            
            <div id="loader" class="hidden text-center py-10 font-black text-blue-900 text-[10px] animate-pulse">FETCHING UPDATES...</div>
        </div>

        <div id="profile-ui" class="fixed inset-0 bg-white z-[3000] hidden flex-col">
            <div class="p-5 bg-blue-950 text-white flex items-center justify-between">
                <h2 class="font-black italic text-xl">PROFILE</h2>
                <button onclick="hideProfile()" class="text-[10px] font-black bg-red-600 px-5 py-2 rounded-xl uppercase">Back</button>
            </div>
            <div class="p-8 flex-1 space-y-8">
                <div class="flex flex-col items-center">
                    <div id="setting-pfp" class="w-28 h-28 rounded-full bg-slate-200 border-4 border-blue-950 mb-4 overflow-hidden flex items-center justify-center text-5xl">👤</div>
                    <input id="upfp" type="text" placeholder="Image URL paste karein" class="w-full p-4 border-2 rounded-2xl text-[10px] font-bold" onchange="updatePFPPreview()">
                </div>
                <div class="space-y-4">
                    <p class="text-xs font-black">NAME: <span id="p-name" class="text-blue-600"></span></p>
                    <p class="text-xs font-black">EMAIL: <span id="p-email" class="text-blue-600"></span></p>
                    <button onclick="clearData()" class="w-full bg-red-600 text-white p-5 rounded-2xl font-black text-[10px] mt-10 shadow-lg">RESET APP</button>
                </div>
            </div>
        </div>

        <div id="chat-ui" class="fixed inset-0 bg-white z-[2000] hidden flex-col">
            <div class="p-5 bg-blue-950 text-white flex justify-between items-center shadow-2xl">
                <h2 class="font-black italic text-xl">ROZGAR AI</h2>
                <button onclick="hideChat()" class="text-[10px] bg-red-600 px-5 py-2 rounded-xl font-black uppercase">Close</button>
            </div>
            <div id="msg-box" class="flex-1 p-5 overflow-y-auto space-y-4 bg-slate-50"></div>
            <div class="p-4 border-t flex gap-2">
                <input id="chat-in" type="text" placeholder="Pucho kuch bhi..." class="flex-1 p-4 bg-slate-100 rounded-2xl outline-none font-bold text-sm">
                <button onclick="sendChat()" class="bg-blue-950 text-white px-6 rounded-2xl font-black text-[10px]">ASK</button>
            </div>
        </div>
    </div>

    <script>
        let currentQ = "";
        let pageNum = 1;
        let isResultsTab = false;

        // --- Profile Actions ---
        function showProfile() {
            document.getElementById('p-name').innerText = localStorage.getItem('user_n');
            document.getElementById('p-email').innerText = localStorage.getItem('user_e');
            document.getElementById('profile-ui').style.display = 'flex';
        }
        function hideProfile() { document.getElementById('profile-ui').style.display = 'none'; }
        
        function updatePFPPreview() {
            const url = document.getElementById('upfp').value;
            if(url) {
                const img = `<img src="${url}" class="w-full h-full object-cover">`;
                document.getElementById('setting-pfp').innerHTML = img;
                document.getElementById('nav-pfp').innerHTML = img;
                localStorage.setItem('user_pfp', url);
            }
        }

        // --- Nav Fixes ---
        function showChat() {
            document.getElementById('chat-ui').style.display = 'flex';
            window.history.pushState({chat: true}, "");
        }
        function hideChat() { document.getElementById('chat-ui').style.display = 'none'; }
        window.onpopstate = () => hideChat();

        // --- Data Handling (Fixed: Apply vs Result Logic) ---
        async function loadData(q, isMore = false) {
            const box = document.getElementById('results-box');
            const ldr = document.getElementById('loader');
            const lm = document.getElementById('load-more-div');

            if(!isMore) { box.innerHTML = ""; pageNum = 1; }
            currentQ = q;
            ldr.classList.remove('hidden');
            lm.classList.add('hidden');
            
            try {
                const res = await fetch('/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ interest: q + " " + (isMore ? pageNum : "") })
                });
                const data = await res.json();
                ldr.classList.add('hidden');
                
                // Set Button Text and Color based on tab
                const btnText = isResultsTab ? "CHECK RESULT ✅" : "APPLY NOW 🚀";
                const btnColor = isResultsTab ? "bg-emerald-600" : "bg-blue-950";

                data.forEach(item => {
                    box.innerHTML += `
                    <div class="p-6 bg-white border-2 rounded-[2rem] shadow-xl border-l-[12px] border-blue-950 transition active:scale-95">
                        <span class="text-[8px] font-black text-slate-300 uppercase tracking-widest">Update • 2026</span>
                        <h3 class="font-black text-sm uppercase mb-3 mt-1 text-slate-900 leading-tight">${item.title}</h3>
                        <p class="text-[10px] text-slate-500 mb-6 line-clamp-2 italic">${item.snippet}</p>
                        <a href="${item.link}" target="_blank" class="block w-full text-center ${btnColor} text-white py-4 rounded-2xl font-black text-[10px] shadow-lg uppercase tracking-wider">
                            ${btnText}
                        </a>
                    </div>`;
                });
                if(data.length > 0) lm.classList.remove('hidden');
            } catch(e) { ldr.classList.add('hidden'); }
        }

        function loadMore() { pageNum++; loadData(currentQ, true); }

        function switchTab(mode) {
            const tabs = ['tab-central', 'tab-state', 'tab-results'];
            tabs.forEach(t => document.getElementById(t).classList.remove('active-btn'));
            document.getElementById('tab-' + mode).classList.add('active-btn');
            
            const resCats = document.getElementById('result-cats');

            if(mode === 'results') {
                isResultsTab = true;
                resCats.classList.remove('hidden'); // Fix: Show Filter Buttons
                loadData('latest exam results official 2026 sarkari result');
            } else {
                isResultsTab = false;
                resCats.classList.add('hidden'); // Fix: Hide Filter Buttons
                const q = mode === 'central' ? 'central govt jobs 2026' : 'bihar government recruitment 2026';
                loadData(q);
            }
        }

        // --- User Core ---
        function doLogin() {
            const n = document.getElementById('un').value, e = document.getElementById('ue').value, s = document.getElementById('us').value;
            if(!n || !e) return alert("Pura data bhariye bhai!");
            localStorage.setItem('user_n', n); localStorage.setItem('user_e', e); localStorage.setItem('user_s', s);
            location.reload();
        }

        async function sendChat() {
            const inp = document.getElementById('chat-in'), box = document.getElementById('msg-box');
            if(!inp.value) return;
            const msg = inp.value;
            box.innerHTML += `<div class="bg-blue-950 text-white p-4 rounded-2xl ml-10 font-bold text-sm shadow-md">${msg}</div>`;
            inp.value = "";
            box.scrollTop = box.scrollHeight;
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: msg, name: localStorage.getItem('user_n') })
            });
            const d = await res.json();
            box.innerHTML += `<div class="bg-white border-2 p-5 rounded-2xl mr-10 shadow-xl text-sm border-l-8 border-blue-950 font-medium whitespace-pre-line">${d.reply}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        window.onload = () => {
            if(localStorage.getItem('user_n')) {
                document.getElementById('dash-view').classList.remove('hidden');
                if(localStorage.getItem('user_pfp')) {
                    const img = `<img src="${localStorage.getItem('user_pfp')}" class="w-full h-full object-cover">`;
                    document.getElementById('nav-pfp').innerHTML = img;
                    document.getElementById('setting-pfp').innerHTML = img;
                }
                switchTab('central');
            } else {
                document.getElementById('login-view').classList.remove('hidden');
            }
        };

        function clearData() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
