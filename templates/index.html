<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROZGAR AI - Job Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .job-card { 
            border-radius: 25px; 
            transition: 0.3s; 
            border: 2px solid #f1f5f9;
        }
        .job-card:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        input, select { font-size: 1.1rem !important; } /* Bada font inputs ke liye */
    </style>
</head>
<body class="bg-white text-slate-900">

    <div class="max-w-xl mx-auto min-h-screen p-6">
        <div class="text-center py-10">
            <h1 class="text-4xl font-black text-blue-900 italic">ROZGAR AI</h1>
            <p class="text-slate-400 font-bold uppercase tracking-widest text-sm">R Yadav Production</p>
        </div>

        <div id="form-section" class="space-y-6 bg-blue-50 p-8 rounded-[40px]">
            <h2 class="text-2xl font-black text-center text-blue-950 uppercase">User Details</h2>
            
            <input type="text" id="name" placeholder="Apna Naam" class="w-full p-5 rounded-2xl border-none outline-none shadow-sm font-bold">
            
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="state" placeholder="State" class="p-5 rounded-2xl border-none outline-none shadow-sm font-bold">
                <input type="text" id="country" placeholder="Country" value="India" class="p-5 rounded-2xl border-none outline-none shadow-sm font-bold">
            </div>

            <input type="email" id="email" placeholder="Email Address" class="w-full p-5 rounded-2xl border-none outline-none shadow-sm font-bold">
            <input type="date" id="dob" class="w-full p-5 rounded-2xl border-none outline-none shadow-sm font-bold">
            
            <select id="edu" class="w-full p-5 rounded-2xl border-none outline-none shadow-sm font-bold bg-white">
                <option value="10th">10th Level</option>
                <option value="12th">12th Level</option>
                <option value="Graduation">Graduation</option>
            </select>

            <button onclick="findJobs()" class="w-full bg-blue-900 text-white py-6 rounded-[30px] text-xl font-black uppercase shadow-2xl active:scale-95 transition">
                Find Your Best Job 🚀
            </button>
        </div>

        <div id="results-section" class="hidden mt-10 space-y-6 pb-20">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-blue-900">Matched Jobs</h2>
                <button onclick="location.reload()" class="text-blue-500 font-bold underline">Change Info</button>
            </div>
            <div id="job-list" class="space-y-6">
                </div>
        </div>
    </div>

    <script>
        async function findJobs() {
            const userData = {
                name: document.getElementById('name').value,
                state: document.getElementById('state').value,
                edu: document.getElementById('edu').value
            };

            if(!userData.name || !userData.state) {
                alert("Please fill all details!");
                return;
            }

            // UI Switch
            document.getElementById('form-section').classList.add('hidden');
            document.getElementById('results-section').classList.remove('hidden');
            const list = document.getElementById('job-list');
            list.innerHTML = `<p class="text-center py-10 font-bold text-blue-600 animate-pulse text-xl">Searching Best Jobs for you...</p>`;

            try {
                const response = await fetch('/fetch_jobs', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(userData)
                });
                
                const jobs = await response.json();
                list.innerHTML = '';

                jobs.forEach(job => {
                    list.innerHTML += `
                        <div class="job-card p-8 bg-white shadow-lg">
                            <span class="text-xs font-black text-blue-500 uppercase">${job.source}</span>
                            <h3 class="text-2xl font-black text-slate-800 mt-2 mb-3">${job.title}</h3>
                            <p class="text-slate-500 text-lg leading-relaxed mb-6">${job.snippet}</p>
                            <a href="${job.link}" target="_blank" class="block text-center bg-blue-950 text-white py-4 rounded-2xl font-black text-lg uppercase shadow-md">
                                Apply Now 🚀
                            </a>
                        </div>`;
                });
            } catch (error) {
                list.innerHTML = `<p class="text-red-500 font-bold">Error loading jobs. Please check API Key.</p>`;
            }
        }
    </script>
</body>
</html>
