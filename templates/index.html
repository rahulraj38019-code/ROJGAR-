<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); min-height: 100vh; font-family: sans-serif; }
        .job-card { transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .job-card:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-color: #3b82f6; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-6 border border-blue-50">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-black text-blue-900 uppercase tracking-tighter">ROZGAR</h1>
            <p class="text-xs text-blue-500 font-bold">LATEST JOB UPDATES 2026</p>
        </div>

        <div id="setup-section" class="space-y-4">
            <input id="u_name" placeholder="Apna Naam" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-blue-500">
            <input id="u_state" placeholder="Rajya (e.g. Bihar)" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-blue-500">
            <input id="u_interest" placeholder="Job Type (e.g. Railway)" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-blue-500">
            <button onclick="startSearch()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-all">Search Jobs 🔍</button>
        </div>

        <div id="results-section" class="hidden mt-6">
            <div class="flex justify-between items-center mb-4">
                <h2 id="greet" class="font-bold text-gray-700 text-sm"></h2>
                <button onclick="location.reload()" class="text-red-500 text-xs font-bold bg-red-50 px-2 py-1 rounded">Reset</button>
            </div>
            
            <div id="jobs-list" class="space-y-4"></div>
            
            <div id="loader" class="hidden text-center py-6 text-blue-500 font-bold animate-pulse">Searching for jobs...</div>
            
            <div id="load-more-container" class="hidden mt-8 mb-4 text-center">
                <button onclick="loadMore()" id="load-btn" class="w-full bg-gray-100 text-blue-600 py-3 rounded-xl font-bold border-2 border-dashed border-blue-200 hover:bg-blue-50">Aur Jobs Dekho ↓</button>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;

        async function startSearch() {
            const name = document.getElementById('u_name').value;
            if(!name) return alert("Pehle apna naam bataiye!");
            
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('results-section').classList.remove('hidden');
            document.getElementById('greet').innerText = "Hi " + name + ", results niche dekhein:";
            
            currentPage = 1;
            document.getElementById('jobs-list').innerHTML = '';
            fetchJobs();
        }

        async function loadMore() {
            currentPage++;
            fetchJobs();
        }

        async function fetchJobs() {
            const state = document.getElementById('u_state').value;
            const interest = document.getElementById('u_interest').value;
            const loader = document.getElementById('loader');
            const loadBtn = document.getElementById('load-btn');
            const loadContainer = document.getElementById('load-more-container');

            loader.classList.remove('hidden');
            loadContainer.classList.add('hidden');

            try {
                const res = await fetch('/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({state, interest, page: currentPage})
                });
                const jobs = await res.json();
                
                loader.classList.add('hidden');
                
                if(jobs.length > 0) {
                    loadContainer.classList.remove('hidden');
                    let html = '';
                    jobs.forEach(j => {
                        html += `
                            <div class="job-card p-4 bg-white rounded-2xl shadow-sm">
                                <h3 class="font-bold text-blue-900 text-sm leading-tight mb-1">${j.title}</h3>
                                <p class="text-[10px] text-gray-500 mb-3">${j.snippet.substring(0, 120)}...</p>
                                <a href="${j.link}" target="_blank" class="text-center block w-full bg-blue-50 text-blue-700 py-2 rounded-lg text-xs font-black uppercase tracking-widest border border-blue-100">Apply Now</a>
                            </div>`;
                    });
                    document.getElementById('jobs-list').innerHTML += html;
                } else {
                    loadContainer.innerHTML = "<p class='text-gray-400 text-xs mt-4'>Aur results nahi mile.</p>";
                    loadContainer.classList.remove('hidden');
                }
            } catch (e) { 
                alert("Server busy hai, thoda ruko!");
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
