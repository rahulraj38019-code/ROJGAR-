<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROZGAR AI - R YADAV PRODUCTION</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="main-container">
        <div class="text-center py-10">
            <h1 class="text-5xl font-black text-blue-950 italic tracking-tighter">ROZGAR AI</h1>
            <p class="text-[10px] font-bold text-blue-500 tracking-[6px] uppercase mt-2">R Yadav Production</p>
        </div>

        <div id="form-section" class="form-card">
            <h2 class="text-xl font-black text-blue-900 mb-6 uppercase text-center">Apni Details Bharein</h2>
            
            <div class="space-y-4">
                <input type="text" id="name" placeholder="Pura Naam (e.g. Rahul Raj)" class="shadow-inner">
                
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="state" placeholder="State (e.g. Bihar)">
                    <input type="text" id="country" value="India" readonly class="bg-slate-50 opacity-70">
                </div>

                <input type="email" id="email" placeholder="Email Address">
                
                <div class="text-left px-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Date of Birth</label>
                    <input type="date" id="dob" class="mt-1">
                </div>

                <select id="edu">
                    <option value="10TH">10th Pass</option>
                    <option value="12TH" selected>12th Pass</option>
                    <option value="GRADUATION">Graduation</option>
                </select>

                <button onclick="findJobs()" class="btn-primary mt-4">
                    Find Your Best Job 🚀
                </button>
            </div>
        </div>

        <div id="results-section" class="hidden pb-20">
            <div class="flex justify-between items-center mb-6 px-2">
                <h2 class="text-2xl font-black text-blue-950 uppercase">Matched Jobs</h2>
                <button onclick="goBackToForm()" class="text-sm font-bold text-blue-500 border-b-2 border-blue-500">Edit Info</button>
            </div>
            
            <div id="job-list" class="space-y-6">
                </div>
        </div>
    </div>

    <script>
        // Back Button logic to show form again
        function goBackToForm() {
            document.getElementById('results-section').classList.add('hidden');
            document.getElementById('form-section').style.display = 'block';
        }

        async function findJobs() {
            const name = document.getElementById('name').value;
            const state = document.getElementById('state').value;
            const edu = document.getElementById('edu').value;

            if(!name || !state) {
                alert("Bhai, Naam aur State bharna zaroori hai!");
                return;
            }

            // UI Changes
            document.getElementById('form-section').style.display = 'none';
            document.getElementById('results-section').classList.remove('hidden');
            
            const list = document.getElementById('job-list');
            list.innerHTML = `
                <div class="text-center py-20">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-4 border-blue-900 mb-4"></div>
                    <p class="font-black text-blue-900 text-lg animate-pulse uppercase">Searching Live Jobs from Google...</p>
                </div>`;

            try {
                const response = await fetch('/fetch_jobs', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name, state, edu })
                });
                
                const jobs = await response.json();
                list.innerHTML = '';

                if(jobs.length === 0) {
                    list.innerHTML = '<p class="text-center py-10 font-bold text-slate-400">Bhai, koi job nahi mili. Dobara try karo!</p>';
                    return;
                }

                jobs.forEach(job => {
                    list.innerHTML += `
                        <div class="job-card-premium">
                            <div class="flex justify-between items-start">
                                <span class="source-chip">${job.source}</span>
                                <span class="live-blink">● LIVE</span>
                            </div>
                            <h3 class="text-xl font-black text-slate-900 mt-3 leading-tight">${job.title}</h3>
                            <p class="text-sm text-slate-500 mt-2 line-clamp-3">${job.snippet}</p>
                            <div class="mt-6">
                                <button onclick="window.open('${job.link}', '_blank')" class="apply-btn-card">
                                    Apply Now 🚀
                                </button>
                            </div>
                        </div>`;
                });
            } catch (error) {
                list.innerHTML = '<p class="text-center text-red-500 font-bold">Network Error! Backend check karein.</p>';
            }
        }
    </script>
</body>
</html>
