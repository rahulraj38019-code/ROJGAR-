<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROZGAR AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #2563eb; --dark: #1e3a8a; --bg: #f8fafc; --insta: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        body { background: var(--bg); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .dash-card { background: white; padding: 20px; border-radius: 25px; text-align: center; box-shadow: 0 8px 15px rgba(0,0,0,0.03); cursor: pointer; transition: 0.3s; border: 2px solid transparent; }
        .dash-card:hover { border-color: var(--blue); transform: translateY(-3px); }
        .btn-primary { width: 100%; background: var(--blue); color: white; padding: 18px; border: none; border-radius: 20px; font-size: 16px; font-weight: 900; cursor: pointer; }
        .hidden { display: none; }
        
        /* Glow AI Button */
        .ai-btn-special {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: white; border: none; border-radius: 25px; padding: 20px; font-weight: 900;
            cursor: pointer; margin-top: 20px; width: 100%; display: flex;
            align-items: center; justify-content: center; gap: 12px;
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3); transition: 0.3s;
        }
        .ai-icon-pulse { width: 12px; height: 12px; background: #00ffcc; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(0, 255, 204, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); } }

        /* Chat Styles */
        #chat-box { height: 350px; overflow-y: auto; border: 1px solid #e2e8f0; padding: 15px; border-radius: 20px; background: #fff; margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 10px; padding: 10px 15px; border-radius: 15px; font-size: 14px; max-width: 80%; }
        .user-msg { background: var(--blue); color: white; align-self: flex-end; }
        .ai-msg { background: #e2e8f0; color: var(--dark); align-self: flex-start; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-sec" class="hidden">
        <h1 style="text-align:center; color:var(--dark); font-weight:900;">ROZGAR AI</h1>
        <div class="card">
            <input type="text" id="u-name" placeholder="Naam" style="width:100%; padding:15px; margin-bottom:10px; border-radius:15px; border:2px solid #e2e8f0; box-sizing:border-box;">
            <input type="text" id="u-state" placeholder="Bihar" style="width:100%; padding:15px; margin-bottom:10px; border-radius:15px; border:2px solid #e2e8f0; box-sizing:border-box;">
            <select id="u-edu" style="width:100%; padding:15px; margin-bottom:10px; border-radius:15px; border:2px solid #e2e8f0; box-sizing:border-box;">
                <option value="12th">12th Pass</option>
                <option value="ITI">ITI Pass</option>
                <option value="Graduate">Graduation</option>
            </select>
            <button onclick="saveLogin()" class="btn-primary">Aage Badhein 🚀</button>
        </div>
    </div>

    <div id="dash-sec" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; padding-bottom:15px;">
            <h2 style="font-weight:900;">Hi, <span id="p-name" style="color:var(--blue);">User</span></h2>
            <button onclick="logout()" style="color:red; border:none; background:none; font-weight:800;">LOGOUT</button>
        </div>
        <div class="dash-grid">
            <div class="dash-card" onclick="openJobs('govt')"><i>🏛️</i><span>Govt Jobs</span></div>
            <div class="dash-card" onclick="openJobs('railway')"><i>🚂</i><span>Railway</span></div>
            <div class="dash-card" onclick="showResults()"><i>📄</i><span>Results</span></div>
            <div class="dash-card" onclick="openJobs('iti')"><i>⚙️</i><span>ITI Jobs</span></div>
        </div>

        <button onclick="showAI()" class="ai-btn-special">
            <div class="ai-icon-pulse"></div>
            <span>क्या मैं आपकी मदद कर सकता हूँ?</span>
        </button>

        <div style="display: flex; gap: 10px; margin-top: 30px;">
            <a href="https://www.instagram.com/___rahul_yadav_._" target="_blank" style="background: var(--insta); padding: 15px; border-radius: 15px; color:white; text-decoration:none; flex:1; text-align:center; font-weight:800;">Instagram</a>
            <a href="https://whatsapp.com/channel/0029VbCL3cTElagwBiU2aJ2N" target="_blank" style="background: #25D366; padding: 15px; border-radius: 15px; color:white; text-decoration:none; flex:1; text-align:center; font-weight:800;">WhatsApp</a>
        </div>
    </div>

    <div id="ai-sec" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; padding-bottom:15px;"><h3>Rozgar AI 🤖</h3><button onclick="showDash()" style="color:var(--blue); border:none; background:none; font-weight:800;">Back</button></div>
        <div class="card">
            <div id="chat-box"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="ai-input" placeholder="Sawal likhein..." style="flex:1; padding:12px; border-radius:12px; border:1px solid #ccc;">
                <button onclick="sendToAI()" style="background:var(--blue); color:white; border:none; padding:10px 20px; border-radius:12px; font-weight:800;">Puchhein</button>
            </div>
        </div>
    </div>

    <div id="feed-sec" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; padding-bottom:15px;"><h3 id="f-title">LIST</h3><button onclick="showDash()" style="color:var(--blue); border:none; background:none; font-weight:800;">Home</button></div>
        <div id="list"></div>
    </div>
</div>

<script>
    let user = {};
    window.onload = () => {
        const saved = localStorage.getItem('rozgarUser');
        if(saved) { user = JSON.parse(saved); showDash(); } 
        else { document.getElementById('login-sec').classList.remove('hidden'); }
    };
    function saveLogin() {
        user = {name: document.getElementById('u-name').value, state: document.getElementById('u-state').value, edu: document.getElementById('u-edu').value};
        localStorage.setItem('rozgarUser', JSON.stringify(user));
        showDash();
    }
    function showDash() {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('dash-sec').classList.remove('hidden');
        document.getElementById('p-name').innerText = user.name;
    }
    function showAI() { document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden')); document.getElementById('ai-sec').classList.remove('hidden'); }
    function showResults() { openJobs('SSC Result'); }
    async function sendToAI() {
        const inp = document.getElementById('ai-input'); const box = document.getElementById('chat-box'); if(!inp.value) return;
        box.innerHTML += `<div class="msg user-msg">${inp.value}</div>`;
        const userMsg = inp.value; inp.value = ''; box.scrollTop = box.scrollHeight;
        const res = await fetch('/ai_chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({message: userMsg, user_info: user}) });
        const data = await res.json();
        box.innerHTML += `<div class="msg ai-msg">${data.reply}</div>`; box.scrollTop = box.scrollHeight;
    }
    async function openJobs(cat) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('feed-sec').classList.remove('hidden');
        document.getElementById('f-title').innerText = cat.toUpperCase();
        const list = document.getElementById('list'); list.innerHTML = 'Searching...';
        const res = await fetch('/fetch_jobs', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({category: cat, state: user.state, edu: user.edu}) });
        const data = await res.json(); list.innerHTML = '';
        data.forEach(i => { list.innerHTML += `<div style="background:white; padding:15px; border-radius:20px; margin-bottom:10px; border-left:5px solid var(--blue);"><h3 style="margin:0; font-size:15px;">${i.title}</h3><a href="${i.link}" target="_blank" style="color:var(--blue); font-weight:800; text-decoration:none; font-size:13px;">CHECK NOW →</a></div>`; });
    }
    function logout() { localStorage.removeItem('rozgarUser'); location.reload(); }
</script>
</body>
</html>
