<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROZGAR HUB</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#007bff">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

<style>
body{margin:0;font-family:Inter;background:#f8fafc}
.container{max-width:500px;margin:auto;padding:15px}
header{display:flex;justify-content:space-between;padding:15px;background:#fff}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px}
.btn{background:#007bff;color:#fff;padding:12px;border:none;border-radius:8px;width:100%}
.ticker{font-size:12px;display:block;margin:5px 0}
</style>
</head>

<body>

<header>
<div><b>ROZGAR HUB</b></div>
<div onclick="toggleDark()">🌙</div>
</header>

<div class="container">

<div id="login">
<input id="name" placeholder="Name" class="card">
<button onclick="saveUser()" class="btn">Start</button>
</div>

<div id="dash" style="display:none">

<div class="card">
<h3>Jobs</h3>
<div id="jobs">Loading...</div>
</div>

<div class="card">
<h3>Admit</h3>
<div id="admits">Loading...</div>
</div>

<input id="search" placeholder="Search jobs..." class="card">
<button onclick="search()" class="btn">Search</button>

<div id="results"></div>

</div>

</div>

<script>
let user = JSON.parse(localStorage.getItem("user"));

if(user){
document.getElementById("login").style.display="none";
document.getElementById("dash").style.display="block";
load();
}

function saveUser(){
let name=document.getElementById("name").value;
if(!name) return alert("Enter name");
localStorage.setItem("user",JSON.stringify({name}));
location.reload();
}

function toggleDark(){
document.body.style.background=document.body.style.background=="black"?"#f8fafc":"black";
}

async function load(){
let jobs=document.getElementById("jobs");
let admits=document.getElementById("admits");

try{
let res=await fetch("/get_live_updates");
let data=await res.json();

let jHTML="";
let aHTML="";

data.jobs.forEach(j=>{
jHTML+=`<a href="${j.link}" target="_blank" class="ticker">${j.title}</a>`;
});

data.admits.forEach(a=>{
aHTML+=`<a href="${a.link}" target="_blank" class="ticker">${a.title}</a>`;
});

jobs.innerHTML=jHTML||"No jobs";
admits.innerHTML=aHTML||"No admits";

}catch{
jobs.innerHTML="Error";
admits.innerHTML="Error";
}
}

setInterval(load,300000);

async function search(){
let q=document.getElementById("search").value;
let resBox=document.getElementById("results");

resBox.innerHTML="Loading...";

let res=await fetch("/fetch_jobs",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({category:q})
});

let data=await res.json();

let html="";
data.forEach(d=>{
html+=`<div class="card">
<b>${d.title}</b><br>
<a href="${d.link}" target="_blank">Apply</a>
</div>`;
});

resBox.innerHTML=html||"No result";
}
</script>

</body>
</html>
