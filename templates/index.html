<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #eff6ff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .job-card { border-radius: 20px; border: 1px solid #e2e8f0; transition: 0.3s; }
        .job-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.1); }
        .ai-btn { position: fixed; bottom: 20px; right: 20px; z-index: 100; }
        .active-tab { border-bottom: 3px solid #1d4ed8; color: #1d4ed8; }
    </style>
</head>
<body class="p-2 sm:p-4">
    <div class="max-w-md mx-auto bg-white rounded-[2.5rem] shadow-2xl p-6 relative overflow-hidden">
        <div class="text-center mb-6">
            <h1 class="text-5xl font-black text-blue-900 italic tracking-tighter">ROZGAR</h1>
            <p class="text-blue-500 font-bold text-[10px] uppercase tracking-[0.3em]">AI-Powered Job Portal</p>
        </div>

        <div id="nav-tabs" class="flex justify-around mb-6 font-bold text-gray-400 border-b hidden">
            <button id="tab-jobs" onclick="switchTab('jobs')" class="pb-2 active-tab">JOBS</button>
            <button id="tab-results" onclick="switchTab('results')" class="pb-2">RESULTS</button>
        </div>

        <div id="setup-section" class="space-y-4">
            <div class="bg-blue-50 p-4 rounded-3xl mb-4">
                <p class="text-blue-800 text-xs font-bold mb-2 text-center italic">"Bihar ke yuvaon ka apna app"</p>
            </div>
            <input id="u_name" placeholder="Apna Naam" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition-all">
            <input id="u_state" placeholder="State (e.g. Bihar)" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition-all">
            <input id="u_interest" placeholder="Qualification (e.g. 10th, ITI, BA)" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition-all">
            <button onclick="startSearch()" class="w-full bg-blue-600 text-white p-5 rounded-3xl font-black text-xl shadow-xl hover:bg-blue-700 active:scale-95">GO TO DASHBOARD 🚀</button>
        </div>

        <div id="results-section" class="hidden">
            <div class="flex justify-between items-center mb-4 bg-blue-50 p-3 rounded-2xl">
                <div>
                    <p id="greet" class="font-black text-blue-900 text-lg uppercase"></p>
                    <p id="loc-display" class="text-[10px] text-blue-500 font-bold"></p>
                </div>
                <button onclick="clearData()" class="bg-white text-red-500 text-[10px] font-black p-2 rounded-xl shadow-sm">RESET</button>
            </div>

            <div id="jobs-container">
                <div id="jobs-list" class="space-y-6"></div>
                <button onclick="loadMore()" id="load-btn" class="w-full mt-6 bg-slate-100 text-blue-600 py-4 rounded-2xl font-black border-2 border-dashed border-blue-200 text-xs">LOAD MORE VACANCIES ↓</button>
            </div>

            <div id="exam-results-container" class="hidden">
                <div id="results-list" class="space-y-6"></div>
            </div>

            <div id="loader" class="hidden text-center py-10 font-black text-blue-600 animate-bounce text-sm uppercase">Loading Data...</div>
        </div>
    </div>

    <div class="ai-btn">
        <button onclick="toggleAI()" class="bg-blue-900 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center border-4 border-white animate-pulse">
            <span class="text-xl">🤖</span>
        </button>
    </div>

    <div id="ai-chat" class="hidden fixed inset-0 bg-black/50 z-[101] flex items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-6 shadow-2xl">
            <div class="flex justify-between mb-4 border-b pb-2">
                <h2 class="font-black text-blue-900">ROZGAR AI</h2>
                <button onclick="toggleAI()" class="text-red-500 font-bold">Close</button>
            </div>
            <p class="text-sm text-gray-600 mb-4">Puchhiye mujhse kuch bhi (Exam details, Document help, etc.)</p>
            <input id="ai-input" type="text" placeholder="Type your message..." class="w-full p-4 bg-slate-50 border rounded-2xl mb-4">
            <button class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">Send Message</button>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let currentTab = 'jobs';

        window.onload = function() {
            const savedName = localStorage.getItem('rozgar_name');
            const savedState = localStorage.getItem('rozgar_state');
            const savedInterest = localStorage.getItem('rozgar_interest');

            if(savedName) {
                document.getElementById('u_name').value = savedName;
                document.getElementById('u_state').value = savedState;
                document.getElementById('u_interest').value = savedInterest;
            }
        };

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-jobs').classList.remove('active-tab');
            document.getElementById('tab-results').classList.remove('active-tab');
            document.getElementById('jobs-container').classList.add('hidden');
            document.getElementById('exam-results-container').classList.add('hidden');

            if(tab === 'jobs') {
                document.getElementById('tab-jobs').classList.add('active-tab');
                document.getElementById('jobs-container').classList.remove('hidden');
            } else {
                document.getElementById('tab-results').classList.add('active-tab');
                document.getElementById('exam-results-container').classList.remove('hidden');
                if(document.getElementById('results-list').innerHTML === '') fetchResults();
            }
        }

        function startSearch() {
            const name = document.getElementById('u_name').value;
            const state = document.getElementById('u_state').value;
            const interest = document.getElementById('u_interest').value;

            if(!name || !state || !interest) return alert("Pura detail bharo bhai!");

            localStorage.setItem('rozgar_name', name);
            localStorage.setItem('rozgar_state', state);
            localStorage.setItem('rozgar_interest', interest);

            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('results-section').classList.remove('hidden');
            document.getElementById('nav-tabs').classList.remove('hidden');
            document.getElementById('greet').innerText = name;
            document.getElementById('loc-display').innerText = "📍 " + state + " | " + interest;

            fetchJobs();
        }

        async function fetchJobs() {
            const state = localStorage.getItem('rozgar_state');
            const interest = localStorage.getItem('rozgar_interest');
            toggleLoader(true);

            const res = await fetch('/search', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({state, interest, page: currentPage})
            });
            const data = await res.json();
            toggleLoader(false);
            
            data.forEach(j => {
                document.getElementById('jobs-list').innerHTML += `
                    <div class="job-card p-5 bg-white shadow-sm border-l-8 border-blue-600">
                        <h2 class="text-xl font-black text-blue-900 leading-tight mb-3">${j.title}</h2>
                        <div class="grid grid-cols-2 gap-2 mb-4">
                            <div class="bg-blue-50 p-2 rounded-lg text-center"><p class="text-[9px] font-bold text-blue-400">FEES</p><p class="text-xs font-black">Check Link</p></div>
                            <div class="bg-green-50 p-2 rounded-lg text-center"><p class="text-[9px] font-bold text-green-400">LAST DATE</p><p class="text-xs font-black">Latest</p></div>
                        </div>
                        <p class="text-xs text-gray-500 mb-4 font-medium">${j.snippet}</p>
                        <a href="${j.link}" target="_blank" class="block w-full text-center bg-blue-900 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg">Apply Now / View Details</a>
                    </div>`;
            });
        }

        async function fetchResults() {
            const state = localStorage.getItem('rozgar_state');
            toggleLoader(true);
            const res = await fetch('/search', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({interest: "exam result sarkari", state: state, page: 1})
            });
            const data = await res.json();
            toggleLoader(false);

            data.forEach(r => {
                document.getElementById('results-list').innerHTML += `
                    <div class="job-card p-5 bg-white border-l-8 border-green-500">
                        <p class="text-[10px] font-black text-green-500 uppercase">Latest Result 2026</p>
                        <h2 class="text-lg font-black text-slate-800 mb-3">${r.title}</h2>
                        <a href="${r.link}" target="_blank" class="inline-block text-blue-600 font-bold text-sm underline">Download Result Link</a>
                    </div>`;
            });
        }

        function toggleLoader(show) { document.getElementById('loader').classList = show ? "block" : "hidden"; }
        function toggleAI() { document.getElementById('ai-chat').classList.toggle('hidden'); }
        function clearData() { localStorage.clear(); location.reload(); }
        function loadMore() { currentPage++; fetchJobs(); }
    </script>
</body>
</html>
