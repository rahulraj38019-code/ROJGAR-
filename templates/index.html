<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROZGAR AI - R YADAV PRODUCTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- ALL PREMIUM STYLES START --- */
        :root {
            --bg-main: #f0f4f8;
            --glass: rgba(255, 255, 255, 0.9);
            --primary-gradient: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            --accent-gold: #fbbf24;
            --text-dark: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        .dark-mode {
            --bg-main: #0f172a;
            --glass: rgba(30, 41, 59, 0.8);
            --text-dark: #f8fafc;
            --card-bg: #1e293b;
        }

        body {
            background: linear-gradient(-45deg, #e2e8f0, #f1f5f9, #dee2e6, #f8fafc);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Inter', sans-serif;
            transition: all 0.5s ease;
        }

        body.dark-mode {
            background: linear-gradient(-45deg, #020617, #0f172a, #1e1b4b, #020617);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .job-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
            border-radius: 28px !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark-mode .job-card { border: 1px solid rgba(255, 255, 255, 0.05); color: white; }

        .active-btn {
            background: var(--primary-gradient) !important;
            color: white !important;
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.5);
            border: none !important;
        }

        .active-sub-btn {
            background: linear-gradient(90deg, #f59e0b, #fbbf24) !important;
            color: #000 !important;
            font-weight: 800 !important;
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.3);
        }

        .dark-mode #app-container, .dark-mode #profile-ui, .dark-mode #chat-ui, .dark-mode #dash-view {
            background: var(--bg-main) !important;
            color: white !important;
        }

        .dark-mode .bg-white, .dark-mode .bg-slate-50 { background-color: transparent !important; }
        .dark-mode input { background: #1e293b !important; color: white !important; border: 1px solid #334155 !important; }

        .marquee-live { animation: scroll 20s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        /* --- ALL PREMIUM STYLES END --- */
    </style>
</head>
<body class="bg-slate-100 font-sans overflow-x-hidden transition-colors duration-300">

    <div id="app-container" class="max-w-md mx-auto min-h-screen bg-white shadow-2xl flex flex-col relative">
        
        <div class="p-4 bg-blue-950 text-white flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div onclick="showProfile()" class="w-10 h-10 rounded-full bg-blue-800 border-2 border-blue-400 overflow-hidden cursor-pointer flex items-center justify-center font-black text-[10px] uppercase">Profile</div>
                <div>
                    <h1 class="text-lg font-black italic uppercase leading-none">ROZGAR</h1>
                    <p class="text-[7px] font-bold text-blue-400 uppercase tracking-widest">R YADAV PRODUCTION</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleDarkMode()" id="dark-btn" class="bg-blue-800 p-2.5 rounded-full shadow-lg active:scale-90 transition">🌙</button>
                <button onclick="showChat()" class="bg-blue-800 p-2.5 rounded-full shadow-lg active:scale-90 transition">🤖 AI</button>
            </div>
        </div>

        <div id="dash-view" class="flex-1 flex flex-col hidden">
            <div class="bg-yellow-400 text-black py-2 overflow-hidden border-b-2 border-yellow-500 cursor-pointer" onclick="window.open('https://www.sarkariresult.com','_blank')">
                <div class="marquee-live flex whitespace-nowrap uppercase italic font-black text-[10px]">
                    <span>🔥 SSC GD • Bihar Police Result 2026 • Private WFH Jobs • ITI Apprentice • R YADAV PRODUCTION VIP UPDATE 🔥</span>
                </div>
            </div>

            <div class="p-3 grid grid-cols-2 gap-3 bg-white border-b shadow-sm">
                <button id="master-govt" onclick="switchMaster('govt')" class="py-4 border-2 border-blue-950 rounded-2xl text-[10px] font-black uppercase flex flex-col items-center gap-1 active-btn">
                    <span>🏛️ Government</span>
                </button>
                <button id="master-private" onclick="switchMaster('private')" class="py-4 border-2 border-blue-950 rounded-2xl text-[10px] font-black uppercase flex flex-col items-center gap-1">
                    <span>🏢 Private Jobs</span>
                </button>
            </div>

            <div id="filter-tabs" class="bg-slate-50 p-3 flex gap-2 overflow-x-auto no-scrollbar border-b"></div>
            <div id="results-box" class="p-4 space-y-6 bg-slate-50 flex-1 pb-32"></div>
            <div id="loader" class="hidden text-center py-10 font-black text-blue-900 text-[10px] animate-pulse">FETCHING LIVE DATA...</div>
        </div>

        <div id="login-view" class="p-8 flex-1 flex flex-col justify-center bg-white hidden">
            <h2 class="text-3xl font-black mb-2 italic uppercase text-blue-950">Welcome Dost ✍️</h2>
            <p class="text-[10px] font-bold text-slate-400 mb-6 uppercase">Ek baar apni details bharo!</p>
            <div class="space-y-4">
                <input id="un" type="text" placeholder="Apna Poora Naam" class="w-full p-4 rounded-xl border-2 font-bold outline-none bg-slate-50">
                <input id="ue" type="email" placeholder="Email Address" class="w-full p-4 rounded-xl border-2 font-bold outline-none bg-slate-50">
                <button onclick="doLogin()" class="w-full bg-blue-950 text-white p-5 rounded-xl font-black text-lg shadow-xl uppercase">Start Applying 🚀</button>
            </div>
        </div>

        <div id="floating-support" class="fixed bottom-6 right-6 flex flex-col gap-3 z-[4000] hidden">
            <a href="https://www.instagram.com/___rahul_yadav_._" target="_blank" class="bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-600 text-white px-4 py-2 rounded-full shadow-2xl border-2 border-white text-[9px] font-black uppercase">Follow On Insta</a>
            <a href="https://chat.whatsapp.com/JOvQploZdepGZEQgMpYcmv" target="_blank" class="bg-blue-600 text-white px-4 py-2 rounded-full shadow-2xl border-2 border-white text-[9px] font-black uppercase">VIP Group</a>
        </div>
    </div>

    <div id="profile-ui" class="fixed inset-0 bg-white z-[3000] hidden flex-col">
        <div class="p-5 bg-blue-950 text-white flex items-center justify-between">
            <h2 class="font-black italic text-xl uppercase text-yellow-400">Profile</h2>
            <button onclick="hideProfile()" class="text-[10px] font-black bg-white text-blue-950 px-5 py-2 rounded-xl">Close</button>
        </div>
        <div class="p-8 space-y-4">
            <button onclick="clearData()" class="w-full bg-red-600 text-white p-4 rounded-xl font-black text-[10px] uppercase">Logout / Reset</button>
        </div>
    </div>

    <div id="chat-ui" class="fixed inset-0 bg-white z-[2000] hidden flex-col">
        <div class="p-5 bg-blue-950 text-white flex justify-between items-center"><h2 class="font-black italic text-xl">ROZGAR AI</h2><button onclick="hideChat()" class="text-[10px] bg-red-600 px-5 py-2 rounded-xl font-black uppercase">Close</button></div>
        <div id="msg-box" class="flex-1 p-5 overflow-y-auto space-y-4 bg-slate-50"></div>
        <div class="p-4 border-t flex gap-2 bg-white"><input id="chat-in" type="text" placeholder="Pucho..." class="flex-1 p-4 bg-slate-100 rounded-2xl outline-none"><button onclick="sendChat()" class="bg-blue-950 text-white px-6 rounded-2xl font-black text-[10px]">ASK</button></div>
    </div>

    <script src="/static/script.js"></script>
    <script>
        function toggleDarkMode() {
            const body = document.body;
            const btn = document.getElementById('dark-btn');
            body.classList.toggle('dark-mode');
            
            if(body.classList.contains('dark-mode')) {
                btn.innerText = "☀️";
                localStorage.setItem('theme', 'dark');
            } else {
                btn.innerText = "🌙";
                localStorage.setItem('theme', 'light');
            }
        }

        function clearData() { localStorage.clear(); location.reload(); }

        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('theme') === 'dark') { toggleDarkMode(); }
            if(localStorage.getItem('user_n')) {
                document.getElementById('dash-view').classList.remove('hidden');
                document.getElementById('floating-support').classList.remove('hidden');
            } else {
                document.getElementById('login-view').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
