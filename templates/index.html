<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROZGAR AI - R YADAV PRODUCTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-btn { background: #172554 !important; color: white !important; transform: scale(1.05); box-shadow: 0 10px 20px rgba(23, 37, 84, 0.3); }
        .active-sub-btn { background: #fbbf24 !important; color: black !important; border-color: #fbbf24 !important; font-weight: 900; }
        .marquee-live { animation: scroll 20s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        .job-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 2rem !important; }
        .job-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-slate-100 font-sans">

    <div id="app-container" class="max-w-md mx-auto min-h-screen bg-white shadow-2xl flex flex-col relative">
        
        <div class="p-4 bg-blue-950 text-white flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div id="nav-pfp" onclick="showProfile()" class="w-10 h-10 rounded-full bg-blue-800 border-2 border-blue-400 overflow-hidden cursor-pointer flex items-center justify-center font-black text-xs">👤</div>
                <div>
                    <h1 class="text-lg font-black italic uppercase leading-none">ROZGAR</h1>
                    <p class="text-[7px] font-bold text-blue-400 uppercase tracking-widest">R YADAV PRODUCTION</p>
                </div>
            </div>
            <button onclick="showChat()" class="bg-blue-800 p-2.5 rounded-full shadow-lg active:scale-90 transition">🤖</button>
        </div>

        <div id="dash-view" class="flex-1 flex flex-col hidden">
            <div class="bg-yellow-400 text-black py-2 overflow-hidden border-b-2 border-yellow-500 cursor-pointer" onclick="window.open('https://www.sarkariresult.com','_blank')">
                <div class="marquee-live flex whitespace-nowrap uppercase italic font-black text-[10px]">
                    <span>🔥 SSC GD • Bihar Police Result 2026 • Private WFH Jobs • ITI Apprentice • R YADAV PRODUCTION VIP UPDATE 🔥</span>
                </div>
            </div>

            <div class="p-3 grid grid-cols-2 gap-3 bg-white border-b shadow-sm">
                <button id="master-govt" onclick="switchMaster('govt')" class="py-4 border-2 border-blue-950 rounded-2xl text-[10px] font-black uppercase flex flex-col items-center gap-1 active-btn">
                    <span>🏛️ Government</span>
                </button>
                <button id="master-private" onclick="switchMaster('private')" class="py-4 border-2 border-blue-950 rounded-2xl text-[10px] font-black uppercase flex flex-col items-center gap-1">
                    <span>🏢 Private Jobs</span>
                </button>
            </div>

            <div id="filter-tabs" class="bg-slate-50 p-3 flex gap-2 overflow-x-auto no-scrollbar border-b">
                </div>

            <div id="results-box" class="p-4 space-y-6 bg-slate-50 flex-1"></div>
            
            <div id="load-more-div" class="p-6 text-center hidden">
                <button onclick="loadMore()" class="bg-blue-950 text-white px-10 py-4 rounded-2xl font-black text-[10px] uppercase shadow-2xl">Load More Data ⬇️</button>
            </div>
            
            <div id="loader" class="hidden text-center py-10 font-black text-blue-900 text-[10px] animate-pulse">FETCHING UPDATES...</div>
        </div>

        <div id="login-view" class="p-8 flex-1 flex flex-col justify-center bg-white hidden">
            <h2 class="text-3xl font-black mb-2 italic uppercase">Welcome ✍️</h2>
            <p class="text-[10px] text-slate-400 font-bold mb-8 uppercase tracking-widest border-b pb-4">Arwal's Digital Job Portal</p>
            <div class="space-y-4">
                <input id="un" type="text" placeholder="Full Name" class="w-full p-4 rounded-xl border-2 font-bold outline-none bg-slate-50">
                <input id="ue" type="email" placeholder="Email Address" class="w-full p-4 rounded-xl border-2 font-bold outline-none bg-slate-50">
                <button onclick="doLogin()" class="w-full bg-blue-950 text-white p-5 rounded-xl font-black text-lg shadow-xl uppercase active:scale-95 transition">Start Now 🚀</button>
            </div>
        </div>

        <div id="profile-ui" class="fixed inset-0 bg-white z-[3000] hidden flex-col">
            <div class="p-5 bg-blue-950 text-white flex items-center justify-between">
                <h2 class="font-black italic text-xl">PROFILE</h2>
                <button onclick="hideProfile()" class="text-[10px] font-black bg-red-600 px-5 py-2 rounded-xl uppercase">Back</button>
            </div>
            <div class="p-8 flex-1 space-y-4">
                <div id="setting-pfp" class="w-24 h-24 rounded-full bg-slate-200 border-4 border-blue-950 mx-auto overflow-hidden flex items-center justify-center text-3xl">👤</div>
                <input id="upfp" type="text" placeholder="Profile Image URL" class="w-full p-3 border-2 rounded-xl text-xs" onchange="updatePFPPreview()">
                <div class="pt-4 border-t">
                    <p class="text-xs font-bold text-slate-400 uppercase">Name</p>
                    <p id="p-name" class="font-black text-lg text-slate-800"></p>
                    <p class="text-xs font-bold text-slate-400 uppercase mt-4">Email</p>
                    <p id="p-email" class="font-black text-lg text-slate-800"></p>
                </div>
                <button onclick="clearData()" class="w-full bg-red-600 text-white p-4 rounded-xl font-black text-[10px] mt-10 uppercase">Logout / Reset</button>
            </div>
        </div>

        <div id="chat-ui" class="fixed inset-0 bg-white z-[2000] hidden flex-col">
            <div class="p-5 bg-blue-950 text-white flex justify-between items-center">
                <h2 class="font-black italic text-xl">ROZGAR AI</h2>
                <button onclick="hideChat()" class="text-[10px] bg-red-600 px-5 py-2 rounded-xl font-black uppercase">Close</button>
            </div>
            <div id="msg-box" class="flex-1 p-5 overflow-y-auto space-y-4 bg-slate-50"></div>
            <div class="p-4 border-t flex gap-2 bg-white">
                <input id="chat-in" type="text" placeholder="Pucho kuch bhi..." class="flex-1 p-4 bg-slate-100 rounded-2xl outline-none font-bold text-sm">
                <button onclick="sendChat()" class="bg-blue-950 text-white px-6 rounded-2xl font-black text-[10px]">ASK</button>
            </div>
        </div>
    </div>

    <script>
        let currentMaster = 'govt';
        let currentQ = "";
        let pageNum = 1;

        const filters = {
            govt: [
                { id: 'all', label: 'All India 🇮🇳', q: 'central govt jobs 2026' },
                { id: 'state', label: 'Bihar Special 🚩', q: 'bihar govt vacancy 2026' },
                { id: 'iti', label: 'ITI/Technical 🛠️', q: 'railway ITI apprentice 2026' },
                { id: 'results', label: 'Sarkari Result ✅', q: 'latest sarkari result 2026' }
            ],
            private: [
                { id: 'remote', label: 'Work From Home 🏠', q: 'remote work from home jobs india 2026' },
                { id: 'full', label: 'Full Time 🏢', q: 'private company jobs in india 2026' },
                { id: 'part', label: 'Part Time ⏰', q: 'part time student jobs india 2026' },
                { id: 'intern', label: 'Internships 🎓', q: 'internshala student internships 2026' }
            ]
        };

        function switchMaster(type) {
            currentMaster = type;
            document.getElementById('master-govt').classList.toggle('active-btn', type === 'govt');
            document.getElementById('master-private').classList.toggle('active-btn', type === 'private');
            renderFilters();
        }

        function renderFilters() {
            const container = document.getElementById('filter-tabs');
            container.innerHTML = "";
            filters[currentMaster].forEach((f, index) => {
                const btn = document.createElement('button');
                btn.id = 'f-' + f.id;
                btn.className = `px-5 py-2.5 border-2 border-slate-200 rounded-xl text-[9px] font-black uppercase whitespace-nowrap transition-all ${index === 0 ? 'active-sub-btn' : ''}`;
                btn.innerText = f.label;
                btn.onclick = () => {
                    document.querySelectorAll('#filter-tabs button').forEach(b => b.classList.remove('active-sub-btn'));
                    btn.classList.add('active-sub-btn');
                    loadData(f.q);
                };
                container.appendChild(btn);
            });
            loadData(filters[currentMaster][0].q); // Default pehli filter load karo
        }

        async function loadData(q, isMore = false) {
            const box = document.getElementById('results-box');
            const ldr = document.getElementById('loader');
            const lm = document.getElementById('load-more-div');

            if(!isMore) { box.innerHTML = ""; pageNum = 1; }
            currentQ = q;
            ldr.classList.remove('hidden');
            lm.classList.add('hidden');
            
            try {
                const res = await fetch('/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ interest: q + " " + (isMore ? pageNum : "") })
                });
                const data = await res.json();
                ldr.classList.add('hidden');
                
                const btnColor = currentMaster === 'govt' ? "bg-blue-950" : "bg-indigo-600";

                data.forEach(item => {
                    box.innerHTML += `
                    <div class="job-card p-6 bg-white border-2 border-slate-100 shadow-xl border-l-[10px] ${currentMaster === 'govt' ? 'border-blue-950' : 'border-indigo-600'}">
                        <span class="text-[8px] font-black text-slate-300 uppercase tracking-widest">${currentMaster} Update • 2026</span>
                        <h3 class="font-black text-sm uppercase mb-3 mt-1 text-slate-900 leading-tight">${item.title}</h3>
                        <p class="text-[10px] text-slate-500 mb-6 line-clamp-2 italic">${item.snippet}</p>
                        <a href="${item.link}" target="_blank" class="block w-full text-center ${btnColor} text-white py-4 rounded-2xl font-black text-[10px] shadow-lg uppercase tracking-wider">Details & Apply 🚀</a>
                    </div>`;
                });
                if(data.length > 0) lm.classList.remove('hidden');
            } catch(e) { ldr.classList.add('hidden'); }
        }

        // Baki functions (Profile, Chat, Login) jo pehle the
        function showProfile() {
            document.getElementById('p-name').innerText = localStorage.getItem('user_n');
            document.getElementById('p-email').innerText = localStorage.getItem('user_e');
            document.getElementById('profile-ui').style.display = 'flex';
        }
        function hideProfile() { document.getElementById('profile-ui').style.display = 'none'; }
        function showChat() { document.getElementById('chat-ui').style.display = 'flex'; }
        function hideChat() { document.getElementById('chat-ui').style.display = 'none'; }

        function doLogin() {
            const n = document.getElementById('un').value, e = document.getElementById('ue').value;
            if(!n || !e) return alert("Details bharo bhai!");
            localStorage.setItem('user_n', n); localStorage.setItem('user_e', e);
            location.reload();
        }

        async function sendChat() {
            const inp = document.getElementById('chat-in'), box = document.getElementById('msg-box');
            if(!inp.value) return;
            const msg = inp.value;
            box.innerHTML += `<div class="bg-blue-950 text-white p-4 rounded-2xl ml-10 font-bold text-sm shadow-md">${msg}</div>`;
            inp.value = "";
            box.scrollTop = box.scrollHeight;
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: msg, name: localStorage.getItem('user_n') })
                });
                const d = await res.json();
                box.innerHTML += `<div class="bg-white border-2 p-5 rounded-2xl mr-10 shadow-xl text-sm border-l-8 border-blue-950 font-medium whitespace-pre-line">${d.reply}</div>`;
            } catch(e) { }
            box.scrollTop = box.scrollHeight;
        }

        window.onload = () => {
            if(localStorage.getItem('user_n')) {
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('dash-view').classList.remove('hidden');
                switchMaster('govt');
            } else {
                document.getElementById('login-view').classList.remove('hidden');
                document.getElementById('dash-view').classList.add('hidden');
            }
        };

        function clearData() { localStorage.clear(); location.reload(); }
        function loadMore() { pageNum++; loadData(currentQ, true); }
    </script>
</body>
</html>
