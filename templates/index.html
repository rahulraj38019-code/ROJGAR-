<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROZGAR AI - R YADAV PRODUCTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-slate-100 font-sans overflow-x-hidden transition-colors duration-300">

    <div id="app-container" class="max-w-md mx-auto min-h-screen bg-white shadow-2xl flex flex-col relative">
        
        <div class="p-4 bg-blue-950 text-white flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div id="nav-pfp" onclick="showProfile()" class="w-10 h-10 rounded-full bg-blue-800 border-2 border-blue-400 overflow-hidden cursor-pointer flex items-center justify-center font-black text-[10px] uppercase">Profile</div>
                <div>
                    <h1 class="text-lg font-black italic uppercase leading-none">ROZGAR</h1>
                    <p class="text-[7px] font-bold text-blue-400 uppercase tracking-widest">R YADAV PRODUCTION</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleDarkMode()" id="dark-btn" class="bg-blue-800 p-2.5 rounded-full shadow-lg active:scale-90 transition">🌙</button>
                <button onclick="showChat()" class="bg-blue-800 p-2.5 rounded-full shadow-lg active:scale-90 transition">🤖 AI</button>
            </div>
        </div>

        <div id="dash-view" class="flex-1 flex flex-col hidden">
            <div class="bg-yellow-400 text-black py-2 overflow-hidden border-b-2 border-yellow-500 cursor-pointer" onclick="window.open('https://www.sarkariresult.com','_blank')">
                <div class="marquee-live flex whitespace-nowrap uppercase italic font-black text-[10px]">
                    <span>🔥 SSC GD • Bihar Police Result 2026 • Private WFH Jobs • ITI Apprentice • R YADAV PRODUCTION VIP UPDATE 🔥</span>
                </div>
            </div>

            <div class="p-3 grid grid-cols-2 gap-3 bg-white border-b shadow-sm main-tabs">
                <button id="master-govt" onclick="switchMaster('govt')" class="py-4 border-2 border-blue-950 rounded-2xl text-[10px] font-black uppercase flex flex-col items-center gap-1 active-btn">
                    <span>🏛️ Government</span>
                </button>
                <button id="master-private" onclick="switchMaster('private')" class="py-4 border-2 border-blue-950 rounded-2xl text-[10px] font-black uppercase flex flex-col items-center gap-1">
                    <span>🏢 Private Jobs</span>
                </button>
            </div>

            <div id="filter-tabs" class="bg-slate-50 p-3 flex gap-2 overflow-x-auto no-scrollbar border-b"></div>
            <div id="results-box" class="p-4 space-y-6 bg-slate-50 flex-1 pb-32"></div>
            
            <div id="load-more-div" class="p-6 text-center hidden">
                <button onclick="loadMore()" class="bg-blue-950 text-white px-10 py-4 rounded-2xl font-black text-[10px] uppercase shadow-2xl">Load More Data ⬇️</button>
            </div>
            <div id="loader" class="hidden text-center py-10 font-black text-blue-900 text-[10px] animate-pulse">FETCHING LIVE DATA...</div>
        </div>

        <div id="floating-support" class="fixed bottom-6 right-6 flex flex-col gap-3 z-[4000] hidden cursor-move">
            <a href="https://www.instagram.com/___rahul_yadav_._" target="_blank" class="float-btn flex items-center gap-2 bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-600 text-white pl-4 pr-2 py-2 rounded-full shadow-2xl border-2 border-white active:scale-90 transition">
                <span class="text-[9px] font-black uppercase tracking-tight">Follow On Insta</span>
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="w-8 h-8 bg-white rounded-full p-1.5">
            </a>
            <a href="https://chat.whatsapp.com/JOvQploZdepGZEQgMpYcmv" target="_blank" class="float-btn flex items-center gap-2 bg-blue-600 text-white pl-4 pr-2 py-2 rounded-full shadow-2xl border-2 border-white active:scale-90 transition" style="animation-delay: 0.3s;">
                <span class="text-[9px] font-black uppercase tracking-tight">VIP Group</span>
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="w-8 h-8 bg-white rounded-full p-1">
            </a>
        </div>

        <div id="chat-ui" class="fixed inset-0 bg-white z-[2000] hidden flex-col">
            <div class="p-5 bg-blue-950 text-white flex justify-between items-center">
                <h2 class="font-black italic text-xl">ROZGAR AI</h2>
                <button onclick="hideChat()" class="text-[10px] bg-red-600 px-5 py-2 rounded-xl font-black uppercase">Close</button>
            </div>
            <div id="msg-box" class="flex-1 p-5 overflow-y-auto space-y-4 bg-slate-50"></div>
            <div class="p-4 border-t flex gap-2 bg-white">
                <input id="chat-in" type="text" placeholder="Pucho kuch bhi..." class="flex-1 p-4 bg-slate-100 rounded-2xl outline-none font-bold text-sm">
                <button onclick="sendChat()" class="bg-blue-950 text-white px-6 rounded-2xl font-black text-[10px]">ASK</button>
            </div>
        </div>

    </div>

    <script>
        // Dark Mode Functionality
        function toggleDarkMode() {
            const body = document.body;
            const btn = document.getElementById('dark-btn');
            body.classList.toggle('dark-mode');
            
            if(body.classList.contains('dark-mode')) {
                btn.innerText = "☀️";
                localStorage.setItem('theme', 'dark');
            } else {
                btn.innerText = "🌙";
                localStorage.setItem('theme', 'light');
            }
        }

        // Load Theme on Start
        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('theme') === 'dark') {
                toggleDarkMode();
            }
            // Check Login Status
            if(localStorage.getItem('user_n')) {
                document.getElementById('dash-view').classList.remove('hidden');
                document.getElementById('floating-support').classList.remove('hidden');
            } else {
                document.getElementById('login-view').classList.remove('hidden');
            }
        });

        // --- Baaki purana JavaScript Logic yahan continue hoga ---
        // (switchMaster, loadData, sendChat, etc.)
    </script>
</body>
</html>
