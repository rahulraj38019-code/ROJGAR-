<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); min-height: 100vh; }
        .job-card { transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .job-card:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border-color: #3b82f6; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-6 border border-blue-50">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-black text-blue-900">ROZGAR</h1>
            <p class="text-sm text-blue-600 font-bold">By Rahul AI</p>
        </div>
        <div id="setup-section" class="space-y-4">
            <input id="u_name" placeholder="Apna Naam" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-blue-500">
            <input id="u_state" placeholder="Rajya (e.g. Bihar)" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-blue-500">
            <input id="u_interest" placeholder="Job Type (e.g. Railway)" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-blue-500">
            <button onclick="startSearch()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700">Jobs Dhundho 🔍</button>
        </div>
        <div id="results-section" class="hidden space-y-4 mt-6">
            <div class="flex justify-between items-center"><h2 id="greet" class="font-bold text-gray-700"></h2><button onclick="location.reload()" class="text-red-500 text-xs font-bold">Reset</button></div>
            <div id="loader" class="text-center py-10 text-blue-500 animate-bounce">Searching...</div>
            <div id="jobs-list" class="space-y-4"></div>
        </div>
    </div>
    <script>
        async function startSearch() {
            const name = document.getElementById('u_name').value;
            const state = document.getElementById('u_state').value;
            const interest = document.getElementById('u_interest').value;
            if(!name || !state || !interest) return alert("Sari details bhariye!");
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('results-section').classList.remove('hidden');
            document.getElementById('greet').innerText = "Hi " + name + ", aapke liye jobs:";
            try {
                const res = await fetch('/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({state, interest})
                });
                const jobs = await res.json();
                document.getElementById('loader').classList.add('hidden');
                let html = '';
                jobs.forEach(j => {
                    html += `<div class="job-card p-4 bg-white rounded-xl"><h3 class="font-bold text-blue-900 text-sm mb-1">${j.title}</h3><p class="text-xs text-gray-500 mb-3">${j.snippet.substring(0, 100)}...</p><a href="${j.link}" target="_blank" class="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-2 rounded-lg block text-center uppercase tracking-wider">Apply Now</a></div>`;
                });
                document.getElementById('jobs-list').innerHTML = html || "<p class='text-center text-gray-400'>No jobs found.</p>";
            } catch (e) { alert("Error: " + e); }
        }
    </script>
</body>
</html>
