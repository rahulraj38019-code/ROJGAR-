<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROZGAR AI - R YADAV PRODUCTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-slate-100 font-sans overflow-x-hidden transition-all duration-300">

    <div id="app-container" class="max-w-md mx-auto min-h-screen bg-white shadow-2xl flex flex-col relative">
        
        <div class="p-4 bg-blue-950 text-white flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div onclick="location.reload()" class="w-10 h-10 rounded-full bg-blue-800 border-2 border-blue-400 flex items-center justify-center font-black text-[10px] uppercase cursor-pointer">PFP</div>
                <div>
                    <h1 class="text-lg font-black italic uppercase leading-none">ROZGAR</h1>
                    <p class="text-[7px] font-bold text-blue-400 uppercase tracking-widest">R YADAV PRODUCTION</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleDarkMode()" id="dark-btn" class="bg-red-600 p-2.5 rounded-full shadow-lg active:scale-90 transition">🌙</button>
                <button class="bg-blue-800 p-2.5 rounded-full shadow-lg">🤖 AI</button>
            </div>
        </div>

        <div class="bg-yellow-400 text-black py-2 overflow-hidden border-b-2 border-yellow-500 cursor-pointer">
            <div class="marquee-live flex whitespace-nowrap uppercase italic font-black text-[10px]">
                <span>🔥 SSC GD RESULT 2026 • BIHAR POLICE NEW UPDATE • ITI APPRENTICE • PRIVATE WFH JOBS LIVE 🔥</span>
            </div>
        </div>

        <div class="p-3 grid grid-cols-2 gap-3 bg-white border-b shadow-sm">
            <button id="btn-govt" onclick="switchTab('govt')" class="py-4 border-2 border-blue-950 rounded-2xl text-[10px] font-black uppercase active-btn">🏛️ Government</button>
            <button id="btn-private" onclick="switchTab('private')" class="py-4 border-2 border-blue-950 rounded-2xl text-[10px] font-black uppercase">🏢 Private Jobs</button>
        </div>

        <div id="results-box" class="p-4 space-y-4 bg-slate-50 flex-1 pb-32">
            </div>

        <div id="floating-support" class="fixed bottom-6 right-6 flex flex-col gap-3 z-50">
            <a href="https://www.instagram.com/___rahul_yadav_._" target="_blank" class="flex items-center gap-2 bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-600 text-white pl-4 pr-2 py-2 rounded-full shadow-2xl border-2 border-white">
                <span class="text-[9px] font-black uppercase">Follow On Insta</span>
                <div class="w-8 h-8 bg-white rounded-full p-1.5"><img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg"></div>
            </a>
            <a href="https://chat.whatsapp.com/JOvQploZdepGZEQgMpYcmv" target="_blank" class="flex items-center gap-2 bg-blue-600 text-white pl-4 pr-2 py-2 rounded-full shadow-2xl border-2 border-white">
                <span class="text-[9px] font-black uppercase">VIP Group</span>
                <div class="w-8 h-8 bg-white rounded-full p-1"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"></div>
            </a>
        </div>
    </div>

    <script>
        const jobData = {
            govt: [
                { title: "SSC GD Constable 2026", info: "Final Result Status", type: "Result", btn: "Check Result 📄" },
                { title: "Railway Apprentice", info: "ITI Pass Students", type: "Vacancy", btn: "Apply Now 🚀" }
            ],
            private: [
                { title: "Amazon WFH Job", info: "Data Entry Operator", type: "12th Pass", btn: "Apply Now 🚀" },
                { title: "Flipkart Delivery", info: "Local Arwal/Patna", type: "10th Pass", btn: "Apply Now 🚀" }
            ]
        };

        function switchTab(type) {
            document.getElementById('btn-govt').classList.toggle('active-btn', type === 'govt');
            document.getElementById('btn-private').classList.toggle('active-btn', type === 'private');

            const box = document.getElementById('results-box');
            box.innerHTML = '';
            
            jobData[type].forEach(job => {
                box.innerHTML += `
                    <div class="job-card p-5 border shadow-sm mb-4">
                        <div class="flex justify-between items-start">
                            <h3 class="font-black text-blue-950 uppercase text-xs">${job.title}</h3>
                            <span class="bg-blue-100 text-blue-800 text-[8px] px-2 py-1 rounded-full font-bold">${job.type}</span>
                        </div>
                        <p class="text-[10px] text-slate-500 font-bold my-3 italic">${job.info}</p>
                        <button class="w-full bg-blue-950 text-white py-3 rounded-xl font-black text-[10px] uppercase">
                            ${job.btn}
                        </button>
                    </div>`;
            });
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }

        window.onload = () => {
            if(localStorage.getItem('theme') === 'dark') toggleDarkMode();
            switchTab('govt'); // Pehla tab on karega
        };
    </script>
</body>
</html>
