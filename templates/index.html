<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROZGAR AI - Smart Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #2563eb; --dark: #1e3a8a; --bg: #f8fafc; --green: #059669; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        
        /* Input Styles */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 800; color: var(--dark); margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 16px; border-radius: 15px; border: 2px solid #e2e8f0; font-weight: 600; box-sizing: border-box; }

        /* Dashboard Buttons */
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .dash-card { 
            background: white; padding: 20px; border-radius: 25px; text-align: center;
            box-shadow: 0 10px 15px rgba(0,0,0,0.05); cursor: pointer; border: 2px solid transparent; transition: 0.3s;
        }
        .dash-card:hover { border-color: var(--blue); transform: translateY(-5px); }
        .dash-card i { font-size: 30px; display: block; margin-bottom: 10px; }
        .dash-card span { font-weight: 800; font-size: 14px; color: var(--dark); }

        /* Result Tiles */
        .result-tile { background: #f1f5f9; padding: 12px; border-radius: 12px; font-weight: 700; font-size: 13px; cursor: pointer; text-align: center; }
        .result-tile:hover { background: var(--green); color: white; }

        .btn-primary { width: 100%; background: var(--blue); color: white; padding: 18px; border: none; border-radius: 20px; font-size: 16px; font-weight: 900; cursor: pointer; }
        .hidden { display: none; }
        .nav-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section" class="hidden">
        <div style="text-align:center; padding: 40px 0;">
            <h1 style="font-size:40px; font-weight:900; color:var(--dark); font-style:italic;">ROZGAR AI</h1>
            <p style="font-weight:700; color:gray;">CREATE YOUR ACCOUNT</p>
        </div>
        <div class="card">
            <div class="input-group"><label>Pura Naam</label><input type="text" id="u-name" placeholder="Rahul Raj"></div>
            <div class="input-group"><label>Date of Birth</label><input type="date" id="u-dob"></div>
            <div class="input-group"><label>State</label><input type="text" id="u-state" placeholder="Bihar"></div>
            <div class="input-group">
                <label>Education</label>
                <select id="u-edu">
                    <option value="10th">10th</option>
                    <option value="12th">12th</option>
                    <option value="ITI">ITI</option>
                    <option value="Graduate">Graduation</option>
                </select>
            </div>
            <button onclick="saveAndLogin()" class="btn-primary">Login & Save Details 🚀</button>
        </div>
    </div>

    <div id="dashboard-section" class="hidden">
        <div class="nav-header">
            <div>
                <h2 style="margin:0; font-weight:900;">Namaste, <span id="display-name" style="color:var(--blue);">User</span></h2>
                <p id="display-info" style="font-size:12px; color:gray; margin:0;"></p>
            </div>
            <button onclick="logout()" style="background:none; border:none; color:red; font-weight:700;">Logout</button>
        </div>

        <div class="dash-grid">
            <div class="dash-card" onclick="openJobs('govt')"><i>🏛️</i><span>Govt Jobs</span></div>
            <div class="dash-card" onclick="openJobs('wfh')"><i>🏠</i><span>Private/WFH</span></div>
            <div class="dash-card" onclick="openJobs('iti')"><i>⚙️</i><span>ITI Jobs</span></div>
            <div class="dash-card" onclick="openJobs('railway')"><i>🚂</i><span>Railway</span></div>
            <div class="dash-card" onclick="openJobs('bpsc')"><i>✍️</i><span>BPSC/PSC</span></div>
            <div class="dash-card" onclick="openResultMenu()"><i>📄</i><span>All Results</span></div>
        </div>
    </div>

    <div id="result-menu" class="hidden">
        <div class="nav-header">
            <h2 style="font-weight:900;">Exam Results</h2>
            <button onclick="showDash()" style="color:var(--blue); border:none; background:none; font-weight:700;">Back</button>
        </div>
        <div class="card">
            <input type="text" id="res-search" placeholder="Type Result Name (e.g. SSC GD)" style="margin-bottom:15px;">
            <button onclick="searchManualResult()" class="btn-primary" style="padding:10px; margin-bottom:20px;">Search Result 🔍</button>
            
            <label>Categories ↓</label>
            <div class="dash-grid" style="grid-template-columns: 1fr 1fr 1fr; gap:8px;">
                <div class="result-tile" onclick="openJobs('SSC Result')">SSC</div>
                <div class="result-tile" onclick="openJobs('Railway Result')">Railway</div>
                <div class="result-tile" onclick="openJobs('Bihar Police Result')">Bihar Police</div>
                <div class="result-tile" onclick="openJobs('UP Police Result')">UP Police</div>
                <div class="result-tile" onclick="openJobs('10th 12th Board Result')">Board Exam</div>
                <div class="result-tile" onclick="openJobs('ITI Result')">ITI</div>
            </div>
        </div>
    </div>

    <div id="feed-section" class="hidden">
        <div class="nav-header">
            <h3 id="feed-title" style="font-weight:900; text-transform:uppercase;">JOBS</h3>
            <button onclick="showDash()" style="color:var(--blue); border:none; background:none; font-weight:700;">Home</button>
        </div>
        <div id="list"></div>
        <div id="load-more" style="text-align:center; padding:20px; font-weight:800; color:var(--blue);">Loading...</div>
    </div>
</div>

<script>
    let userData = {};
    let page = 1;
    let currentCategory = '';

    // Check if user is already logged in
    window.onload = () => {
        const saved = localStorage.getItem('rozgarUser');
        if(saved) {
            userData = JSON.parse(saved);
            showDash();
        } else {
            document.getElementById('login-section').classList.remove('hidden');
        }
    };

    function saveAndLogin() {
        const name = document.getElementById('u-name').value;
        const dob = document.getElementById('u-dob').value;
        const state = document.getElementById('u-state').value;
        const edu = document.getElementById('u-edu').value;

        if(!name || !state || !dob) { alert("Details bhariye!"); return; }

        userData = { name, dob, state, edu };
        localStorage.setItem('rozgarUser', JSON.stringify(userData));
        showDash();
    }

    function showDash() {
        document.getElementById('login-section').className = 'hidden';
        document.getElementById('result-menu').className = 'hidden';
        document.getElementById('feed-section').className = 'hidden';
        document.getElementById('dashboard-section').className = '';
        
        document.getElementById('display-name').innerText = userData.name;
        document.getElementById('display-info').innerText = `${userData.edu} Pass | ${userData.state}`;
    }

    function openResultMenu() {
        document.getElementById('dashboard-section').className = 'hidden';
        document.getElementById('result-menu').className = '';
    }

    async function openJobs(cat) {
        currentCategory = cat;
        page = 1;
        document.getElementById('dashboard-section').className = 'hidden';
        document.getElementById('result-menu').className = 'hidden';
        document.getElementById('feed-section').className = '';
        document.getElementById('feed-title').innerText = cat;
        document.getElementById('list').innerHTML = '';
        fetchData();
    }

    function searchManualResult() {
        const q = document.getElementById('res-search').value;
        if(!q) return;
        openJobs(q + " Result");
    }

    async function fetchData() {
        const res = await fetch('/fetch_jobs', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ category: currentCategory, state: userData.state, edu: userData.edu, page: page })
        });
        const data = await res.json();
        const list = document.getElementById('list');
        
        data.forEach(item => {
            const isResult = currentCategory.toLowerCase().includes('result');
            list.innerHTML += `
                <div style="background:white; padding:20px; border-radius:25px; margin-bottom:15px; border-left:5px solid ${isResult ? 'var(--green)' : 'var(--blue)'}; shadow:sm;">
                    <h3 style="margin:0; font-size:16px;">${item.title}</h3>
                    <p style="font-size:12px; color:gray;">${item.snippet}</p>
                    <a href="${item.link}" target="_blank" style="display:block; text-align:center; padding:12px; background:${isResult ? 'var(--green)' : 'var(--blue)'}; color:white; text-decoration:none; border-radius:12px; font-weight:800; margin-top:10px;">
                        ${isResult ? 'CHECK RESULT 📄' : 'APPLY NOW 🚀'}
                    </a>
                </div>`;
        });
    }

    function logout() {
        localStorage.removeItem('rozgarUser');
        location.reload();
    }
</script>
</body>
</html>
