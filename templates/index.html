<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROZGAR AI - Professional</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- PROFESSIONAL CSS INTERNAL --- */
        :root {
            --primary-blue: #2563eb;
            --dark-blue: #1e3a8a;
            --bg-light: #f1f5f9;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Inter', sans-serif;
            margin: 0;
            color: #1e293b;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Profile Card Interface */
        .pro-card {
            background: white;
            border-radius: 35px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid #ffffff;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--dark-blue);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: 2px solid #e2e8f0;
            background: #ffffff;
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--primary-blue);
            outline: none;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .btn-main {
            width: 100%;
            background: linear-gradient(135deg, var(--dark-blue) 0%, var(--primary-blue) 100%);
            color: white;
            padding: 22px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }

        /* Premium Job Cards */
        .job-item {
            background: white;
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.03);
            border: 1px solid #e2e8f0;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .source-badge {
            background: #dbeafe;
            color: #1e40af;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .job-title {
            font-size: 22px;
            font-weight: 900;
            color: #0f172a;
            margin: 15px 0 10px 0;
            line-height: 1.2;
        }

        .job-desc {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        /* Blue Apply Button with Emoji */
        .apply-now-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background-color: #2563eb;
            color: white;
            padding: 16px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 800;
            font-size: 16px;
            transition: 0.3s;
        }

        .apply-now-btn:hover { background-color: #1d4ed8; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <div style="text-align: center; padding: 40px 0;">
            <h1 style="font-size: 45px; font-weight: 900; color: #1e3a8a; margin: 0; font-style: italic; letter-spacing: -2px;">ROZGAR AI</h1>
            <p style="font-size: 10px; font-weight: 700; color: #64748b; letter-spacing: 5px; text-transform: uppercase;">R YADAV PRODUCTION</p>
        </div>

        <div id="setup-form" class="pro-card">
            <h2 style="font-size: 18px; font-weight: 900; margin-bottom: 25px; text-align: center; color: #334155;">BASIC INFORMATION</h2>
            
            <div class="input-group">
                <label>Pura Naam</label>
                <input type="text" id="u-name" placeholder="Rahul Raj">
            </div>

            <div class="input-group">
                <label>Apna State</label>
                <input type="text" id="u-state" placeholder="Bihar">
            </div>

            <div class="input-group">
                <label>Education</label>
                <select id="u-edu">
                    <option value="10th">10th Standard</option>
                    <option value="12th" selected>12th Standard</option>
                    <option value="Graduation">Graduation / Degree</option>
                </select>
            </div>

            <button onclick="getJobs()" class="btn-main">Find Your Best Job 🚀</button>
        </div>

        <div id="results-view" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h3 style="font-weight: 900; font-size: 20px; color: #1e3a8a;">LATEST UPDATES ↓</h3>
                <button onclick="location.reload()" style="font-size: 12px; font-weight: 700; color: #2563eb; border: none; background: none; cursor: pointer;">Reset</button>
            </div>
            
            <div id="job-feed">
                </div>
        </div>
    </div>

    <script>
        async function getJobs() {
            const name = document.getElementById('u-name').value;
            const state = document.getElementById('u-state').value;
            const edu = document.getElementById('u-edu').value;

            if(!name || !state) { alert("Naam aur State bharna zaroori hai!"); return; }

            document.getElementById('setup-form').classList.add('hidden');
            document.getElementById('results-view').classList.remove('hidden');
            
            const feed = document.getElementById('job-feed');
            feed.innerHTML = '<div style="text-align:center; padding:50px;"><p style="font-weight:900; color:#2563eb; font-size:18px; animate-pulse">Searching the best jobs for you...</p></div>';

            try {
                const res = await fetch('/fetch_jobs', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, state, edu})
                });
                const jobs = await res.json();
                feed.innerHTML = '';

                jobs.forEach(job => {
                    feed.innerHTML += `
                        <div class="job-item">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span class="source-badge">${job.source}</span>
                                <span style="font-size:10px; font-weight:900; color:#22c55e;">● LIVE NOW</span>
                            </div>
                            <div class="job-title">${job.title}</div>
                            <div class="job-desc">${job.snippet}</div>
                            <a href="${job.link}" target="_blank" class="apply-now-btn">
                                <span>Apply On Official Site</span>
                                <span style="font-size:20px;">🔗</span>
                            </a>
                        </div>
                    `;
                });
            } catch (e) {
                feed.innerHTML = '<p style="color:red; font-weight:bold; text-align:center;">Network Issue! Try again.</p>';
            }
        }
    </script>
</body>
</html>
