<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f8fafc; font-family: sans-serif; }
        .job-card { border-left: 4px solid #3b82f6; transition: 0.3s; }
        .job-card:hover { transform: scale(1.02); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-2xl p-6 border border-blue-100">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-blue-900 italic">ROZGAR</h1>
            <p class="text-blue-500 font-bold text-xs uppercase tracking-widest">Find Your Future</p>
        </div>

        <div id="setup-section" class="space-y-4">
            <input id="u_name" placeholder="Apna Naam" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 ring-blue-400 transition-all">
            <input id="u_state" placeholder="State (e.g. Bihar)" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 ring-blue-400 transition-all">
            <input id="u_interest" placeholder="Job Category (e.g. ITI)" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 ring-blue-400 transition-all">
            <button onclick="startSearch()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black text-lg shadow-lg hover:bg-blue-700 active:scale-95 transition-all">SEARCH NOW 🔍</button>
        </div>

        <div id="results-section" class="hidden mt-6">
            <div class="flex justify-between items-center mb-6">
                <p id="greet" class="font-bold text-slate-600 text-sm"></p>
                <button onclick="clearData()" class="text-red-500 text-xs font-bold border border-red-200 px-3 py-1 rounded-full bg-red-50">Reset</button>
            </div>
            <div id="jobs-list" class="space-y-4"></div>
            <div id="loader" class="hidden text-center py-10 font-bold text-blue-500 animate-pulse text-sm">Searching latest jobs...</div>
            <div id="load-more-container" class="hidden mt-8 mb-4 text-center">
                <button onclick="loadMore()" id="load-btn" class="w-full bg-slate-100 text-blue-600 py-4 rounded-2xl font-black border-2 border-dashed border-blue-200 uppercase text-xs">Aur Jobs Dekho ↓</button>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;

        // Page load hote hi details check karo
        window.onload = function() {
            const savedName = localStorage.getItem('rozgar_name');
            const savedState = localStorage.getItem('rozgar_state');
            const savedInterest = localStorage.getItem('rozgar_interest');

            if(savedName) document.getElementById('u_name').value = savedName;
            if(savedState) document.getElementById('u_state').value = savedState;
            if(savedInterest) document.getElementById('u_interest').value = savedInterest;
        };

        function startSearch() {
            const name = document.getElementById('u_name').value;
            const state = document.getElementById('u_state').value;
            const interest = document.getElementById('u_interest').value;

            if(!name || !state || !interest) return alert("Please fill all details!");

            // Local Storage mein save karo
            localStorage.setItem('rozgar_name', name);
            localStorage.setItem('rozgar_state', state);
            localStorage.setItem('rozgar_interest', interest);

            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('results-section').classList.remove('hidden');
            document.getElementById('greet').innerText = "Hi " + name + ", Bihar Jobs:";

            currentPage = 1;
            document.getElementById('jobs-list').innerHTML = '';
            fetchJobs();
        }

        function clearData() {
            localStorage.clear();
            location.reload();
        }

        async function loadMore() {
            currentPage++;
            fetchJobs();
        }

        async function fetchJobs() {
            const state = document.getElementById('u_state').value;
            const interest = document.getElementById('u_interest').value;
            const loader = document.getElementById('loader');
            const loadContainer = document.getElementById('load-more-container');

            loader.classList.remove('hidden');
            loadContainer.classList.add('hidden');

            try {
                const res = await fetch('/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({state, interest, page: currentPage})
                });
                const jobs = await res.json();
                loader.classList.add('hidden');
                
                if(jobs.length > 0) {
                    loadContainer.classList.remove('hidden');
                    let html = '';
                    jobs.forEach(j => {
                        html += `
                            <div class="job-card p-4 bg-white rounded-xl shadow-md border border-slate-100 mb-4">
                                <h3 class="font-black text-blue-900 text-sm mb-1">${j.title}</h3>
                                <p class="text-[10px] text-slate-500 mb-4">${j.snippet.substring(0, 150)}...</p>
                                <a href="${j.link}" target="_blank" class="block text-center bg-blue-600 text-white py-2 rounded-lg text-[10px] font-bold uppercase">Open Link</a>
                            </div>`;
                    });
                    document.getElementById('jobs-list').innerHTML += html;
                } else {
                    loadContainer.innerHTML = "<p class='text-slate-400 text-xs'>Aur jobs nahi hain.</p>";
                    loadContainer.classList.remove('hidden');
                }
            } catch (e) {
                alert("Error connecting to server!");
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
