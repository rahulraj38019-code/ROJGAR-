<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROZGAR - R YADAV PRODUCTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-slate-100 font-sans">

    <div id="app-container" class="max-w-md mx-auto min-h-screen bg-white shadow-2xl flex flex-col relative">
        
        <div class="p-4 bg-blue-950 text-white flex justify-between items-center sticky top-0 z-50 shadow-md">
            <div class="flex items-center gap-3">
                <div id="nav-pfp" onclick="showProfile()" class="w-10 h-10 rounded-full bg-blue-800 border-2 border-blue-400 overflow-hidden cursor-pointer flex items-center justify-center font-black text-xs shadow-inner">👤</div>
                <div>
                    <h1 class="text-lg font-black italic uppercase leading-none">ROZGAR</h1>
                    <p class="text-[7px] font-bold text-blue-400 uppercase tracking-widest">R YADAV PRODUCTION</p>
                </div>
            </div>
            <button onclick="showChat()" class="bg-blue-800 p-2.5 rounded-full shadow-lg active:scale-90 transition">🤖</button>
        </div>

        <div id="login-view" class="p-8 flex-1 flex flex-col justify-center hidden bg-white">
            <h2 class="text-3xl font-black mb-2 italic text-blue-950">WELCOME ✍️</h2>
            <p class="text-[10px] text-slate-400 font-bold mb-8 uppercase tracking-widest border-b pb-4">Arwal's Digital Job Portal</p>
            <div class="space-y-4">
                <input id="un" type="text" placeholder="Full Name" class="w-full p-4 rounded-xl border-2 font-bold outline-none bg-slate-50">
                <input id="ue" type="email" placeholder="Email Address" class="w-full p-4 rounded-xl border-2 font-bold outline-none bg-slate-50">
                <input id="us" type="text" placeholder="City/State" class="w-full p-4 rounded-xl border-2 font-bold outline-none bg-slate-50">
                <button onclick="doLogin()" class="w-full bg-blue-950 text-white p-5 rounded-xl font-black text-lg shadow-xl uppercase active:scale-95 transition">Verify Profile 🚀</button>
            </div>
        </div>

        <div id="dash-view" class="flex-1 flex flex-col hidden">
            <div class="bg-yellow-400 text-black py-2 overflow-hidden border-b-2 border-yellow-500 cursor-pointer" onclick="window.open('https://www.sarkariresult.com','_blank')">
                <div class="marquee-live flex whitespace-nowrap uppercase italic font-black text-[10px]">
                    <span>🔥 SSC GD Answer Key • Bihar Police Result 2026 • Railway Updates • R YADAV PRODUCTION VIP UPDATE 🔥</span>
                </div>
            </div>

            <div class="bg-white p-3 flex gap-2 overflow-x-auto no-scrollbar border-b">
                <button id="tab-central" onclick="switchTab('central')" class="px-5 py-2.5 border-2 border-blue-950 rounded-xl text-[10px] font-black uppercase whitespace-nowrap transition active-btn">Central Jobs</button>
                <button id="tab-state" onclick="switchTab('state')" class="px-5 py-2.5 border-2 border-blue-950 rounded-xl text-[10px] font-black uppercase whitespace-nowrap transition">State Jobs</button>
                <button id="tab-results" onclick="switchTab('results')" class="px-5 py-2.5 border-2 border-blue-950 rounded-xl text-[10px] font-black uppercase whitespace-nowrap transition">Results</button>
            </div>

            <div id="result-cats" class="hidden p-3 grid grid-cols-2 gap-2 bg-blue-50 border-b">
                <button onclick="loadData('Bihar Board 10th 12th Result 2026')" class="p-2 bg-white rounded-lg shadow-sm border font-black text-[8px] uppercase">Bihar Board 📝</button>
                <button onclick="loadData('SSC Official Results CGL CHSL GD')" class="p-2 bg-white rounded-lg shadow-sm border font-black text-[8px] uppercase">SSC Portal 🏢</button>
                <button onclick="loadData('Railway RRB Results 2026')" class="p-2 bg-white rounded-lg shadow-sm border font-black text-[8px] uppercase">Railway 🚂</button>
                <button onclick="loadData('Bihar Police SI Constable Result')" class="p-2 bg-white rounded-lg shadow-sm border font-black text-[8px] uppercase">Bihar Police 👮</button>
            </div>

            <div id="results-box" class="p-4 space-y-6"></div>
            
            <div id="load-more-div" class="p-6 text-center hidden">
                <button onclick="loadMore()" class="bg-blue-950 text-white px-10 py-4 rounded-2xl font-black text-[10px] uppercase shadow-2xl active:scale-95 transition">Load More Data ⬇️</button>
            </div>
            
            <div id="loader" class="hidden text-center py-10 font-black text-blue-900 text-[10px] animate-pulse">FETCHING UPDATES...</div>
        </div>

        <div id="profile-ui" class="fixed inset-0 bg-white z-[3000] hidden flex-col">
            <div class="p-5 bg-blue-950 text-white flex items-center justify-between">
                <h2 class="font-black italic text-xl">PROFILE</h2>
                <button onclick="hideProfile()" class="text-[10px] font-black bg-red-600 px-5 py-2 rounded-xl uppercase">Back</button>
            </div>
            <div class="p-8 flex-1 space-y-8 overflow-y-auto">
                <div class="flex flex-col items-center">
                    <div id="setting-pfp" class="w-28 h-28 rounded-full bg-slate-200 border-4 border-blue-950 mb-4 overflow-hidden flex items-center justify-center text-5xl">👤</div>
                    <input id="upfp" type="text" placeholder="Image URL paste karein" class="w-full p-4 border-2 rounded-2xl text-[10px] font-bold" onchange="updatePFPPreview()">
                </div>
                <div class="space-y-4">
                    <p class="text-xs font-black uppercase text-slate-400">Name</p>
                    <p id="p-name" class="font-black text-lg border-b pb-2"></p>
                    <p class="text-xs font-black uppercase text-slate-400 mt-4">Email</p>
                    <p id="p-email" class="font-black text-lg border-b pb-2"></p>
                    <button onclick="clearData()" class="w-full bg-red-600 text-white p-5 rounded-2xl font-black text-[10px] mt-10 shadow-lg active:bg-red-700 transition">RESET APP</button>
                </div>
            </div>
        </div>

        <div id="chat-ui" class="fixed inset-0 bg-white z-[2000] hidden flex-col">
            <div class="p-5 bg-blue-950 text-white flex justify-between items-center shadow-2xl">
                <h2 class="font-black italic text-xl">ROZGAR AI</h2>
                <button onclick="hideChat()" class="text-[10px] bg-red-600 px-5 py-2 rounded-xl font-black uppercase">Close</button>
            </div>
            <div id="msg-box" class="flex-1 p-5 overflow-y-auto space-y-4 bg-slate-50"></div>
            <div class="p-4 border-t flex gap-2 bg-white">
                <input id="chat-in" type="text" placeholder="Pucho kuch bhi..." class="flex-1 p-4 bg-slate-100 rounded-2xl outline-none font-bold text-sm shadow-inner">
                <button onclick="sendChat()" class="bg-blue-950 text-white px-8 rounded-2xl font-black text-[10px] uppercase shadow-lg">Ask</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
